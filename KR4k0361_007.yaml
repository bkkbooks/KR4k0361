body:
  text: 卷七瑯琊王錄其先出自周王子晉秦有王翦王離世為名將文選四十六王文憲集序注引瑯琊王錄初魏徐州刺史飪城呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之虔固強與乃受之祥為司空及祥死之日以刀授其弟覽曰吾兒凡汝後必興足稱此刀故以相與覽後奕世賢興于江東文選注同上初學記二十二御覽二百六十三又三百四十五中宗為安東將軍鎮下邳請王導為司馬軍國之事無不諮訪中宗遷鎮建康為司馬委以政事御覽二百四十八王導謂從兄敦曰王仁德未著而名位猶輕兄威名日已振宜有以共相匡舉會三月三日中宗出禊乘興輦敦導並騎从紀瞻使人覘之既聞敦導騎从乃大驚自出拜于道左中宗从容謂導曰卿吾之蕭何也類聚四御覽三十中宗渡江王導群从翼戴時人語曰王與馬共天下御覽四百九十五于時朝野傾心號曰仲父導忠于事上達于从政以百六之弊寄寓江左為治之本務在清靜御覽二百四十八王導為驃騎揚州領中書監錄尚書監錄尚書事時丞相參佐羅宏父母沒賊賊平不奔喪又中丞熊遠尚書周顗等以署過其事為有司所奏導上疏請免錄中宗令曰卿恆總萬機何解錄除節而已書鈔元帝登尊號百官陪位詔王導升御坐固辭然後止世說注七中宗即尊號也時賜諡多由封爵不考德行王導曰臣聞大行受大名小行受小名名則實稱不誣而已近代以來唯爵得諡武官牙門有爵必諡鄉校常伯無爵悉不賜諡甚失制諡之本今中興肇建勳德兼備宜深體前訓使行以諡彰豈可限以有爵中宗納焉自後公卿無髑而諡自導始也類聚四十御覽五百六十二王導以驃騎將軍儀同三司領太子太傅書鈔導从兄敦舉兵討劉隗導率子弟二十餘人旦旦至公車泥首謝罪世說注二顯宗嘗使太常丞張放歸胙于王導詔無下拜導不敢當辭以疾初顯宗幼沖見導恆拜又帝與導手詔則曰敬白中書作詔則曰敬問于是以為永制御覽五百四十二又五百九十三書鈔于是風塵自消內外緝穆世說注四王導薨詔給九旒輬車黃屋左纛前後羽葆鼓吹挽歌兩部虎賁班劍百人中興名臣莫與為比也御覽五百五十四王悅字長豫丞相導長子也世說注一王悅弱冠有高名每侍講東宮以清和著稱除散騎常侍書鈔仕至中書侍郎世說注一王恬字敬豫與濟陽江霖俱善奕碁為中興第一御覽七百五十三王洽字敬和丞相導第三子世說注五洽于公子中最知名與潁川荀羨俱有美稱弱冠除散騎中書侍郎世說注五書鈔累遷吳郡內史為士民所懷徵拜中領軍尋加中書令世說注五顯宗加王洽中書令帝曰敬和清才貴令昔為中書郎吾時尚少數呼見意甚親之令以為中書令欲共講文章之事也類聚四十八初學記十一御覽二百二十不拜年二十六而卒世說注五王劭劭美姿容持儀操也世說注六王薈王珣字元琳弱冠即與陳郡謝玄俱辟大司馬桓溫掾溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆未易才也御覽二百四十九又四百四十三書鈔珣為大司馬掾轉府主簿時大司馬溫經略中夏軍國無寧戎府多事珣居要任有稱績三軍文武及數萬人悉識其面書鈔御覽三百六十五案參軍疑即下三軍之誤字珣拜侍中尚書左僕射領吏部時烈宗雅好典籍深欽愛之與郗恢殷仲堪徐邈並以才學文章為上所昵桓玄答道子牋云王珣明悟疏徹風流之美雖逼于同異才用不盡然君子在朝所益自多也御覽二百十一書鈔王祥弟覽生導導生洽洽生珣珣生曇首文選為蕭揚州作薦士表注王氓珣兄弟皆壻謝氏以猜嫌離婚太傅既與珣絕婚珉又離妻由是二族遂成仇釁世說注六王謐字雅遠丞相導孫車騎劭子有才器襲爵武岡侯世說注五謐弱冠有美譽拜祕書郎書鈔位至司徒世說注五王舒咸和元年當徵蘇峻司徒導欲出王舒為外援及更拜為撫軍將軍會稽內史秩中三千石舒上疏以父名會不得作會稽朝議以字同音異于禮無嫌舒陳音雖異而字同乞換他郡于是改會為鄶舒不得已就職御覽三百六十二王允之字淵猷年在總角从伯敦深知之謂為似己入則共臥嘗夜飲允之辭醉先眠時敦將謀作逆因允之醉別床臥夜中與錢鳳計議允之已醒悉聞其語恐或疑便于眠處大吐衣面並污鳳既出敦果照視見其眠吐中以為大醉不復疑之御覽四百三十一又三百九十六引首六句王廙字世明多才蓺東海王越為太傅辟為記室書鈔王彬字世儒从兄敦入石頭中宗使彬銜命慰勞會周顗被殺彬往哭顗既而見敦敦怪其有涕洟問其所以彬曰向哭伯仁情不能已敦曰伯仁自致刑戮且凡人遇汝復何為哉彬曰伯仁世譽與君齊行忠烈之軌邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌內侮戮殺忠義謀圖不軌禍及門戶敦大怒厲聲曰爾之狂悖乃可至此為吾不能殺汝邪丞相導在坐勸彬起謝彬曰昨暴腳痛不能拜且此復何所謝意氣自若敦曰腳痛孰若頸痛然猶以至親忍不加害御覽四百二十八彬為將作大匠帝以其勤勞爵關內侯書鈔王彪之字叔虎从伯導謂曰選官欲以汝達可作諸王佐郎彪曰位之多少既不足計自當任之于時至于超遷是所不願遂為郎御覽二百十二王彪之為鎮軍將軍會稽內史加散騎常侍居郡八年豪強斂跡亡戶出者三萬餘口類聚六王彪之遷廷尉時永嘉太守謝毅赦後殺郡人周矯矯从兄球詣州訴冤揚州刺史殷浩劾毅遣从事收毅付廷尉彪之執法以球為獄主身無王爵非廷尉所料不肯受與州相反覆穆帝發詔令受之彪之又上疏執據時人云張釋之以來復見斯事類聚四十九略御覽二百三十一王彪之遷尚書令與謝安共掌朝政安數稱曰朝廷大事眾人所不能決者咨之王公無不立判也書鈔王羲之字逸少導之从子也初訥于言人未之知年十三嘗見周顗顗異之時重牛必炙座客未啖先割啖之羲之于是知名御覽二百三十八羲之弱冠知名庾亮請為參軍書鈔羲之為護軍將軍令所任之患在于任役公平也書鈔及長尤善草隸書為今古冠絕累遷為右將軍不樂京師遂往會稽與謝安孫綽等遊處山陰有道士養群鵝羲之意甚悅道士云為寫黃庭經當舉群相贈乃為寫訖籠鵝而去御覽二百三十八羲之與王述志尚不同而兩不相能述為會稽艱居郡境王羲之後為郡申慰而已初不重詣述深以為恨喪除徵拜揚州就徵周行郡境而不歷羲之一別而去羲之初語其友曰王懷祖免喪正可當尚書投老可得為僕射更望會稽便自邈然述既顯授又檢校會稽郡求其得失主者疲于課對羲之恥慨遂稱疾世說注八王羲之為會稽內史慨然稱疾去郡于父母墓前自誓曰維永和十一年二月九日小子羲之敢昭告尊靈羲之不夭夙遭閔凶不遂過庭之訓母兄鞠育得漸庶幾遂因人之力蒙國寵榮進無忠孝之節退違賢量之義將憂及宗祀豈在微身是用寤寐永嘆若墜淵谷止足之分定于今日云云羲之既去官與東土人士盡山水之遊弋釣為娛與道士許元度邁共脩服食採求藥石不遠千里朝廷以其誓苦亦不復徵也御覽四百八十世說注八略王徽之字子猷羲之第五子卓犖不羈欲為傲達放肆聲色頗過度時人欽其才穢其行也世說注四又七書鈔大司馬桓溫以為參軍書鈔徽之任性放達棄官東歸居山陰也世說注七桓沖引徵之為參軍蓬首散帶不常綜理其府事世說注七書鈔徽之為車騎桓沖騎兵參軍沖問卿署何曹對曰似是馬曹又問管幾馬曰不問馬何由知數又問馬比死多少曰未知生焉知死書鈔仕至黃門侍郎世說注四又七王獻子少有清譽亦善隸書後將軍謝安請為長史甚欽愛之御覽二百四十八案羲之七子玄之凝之渙之肅之徽之操之獻之王悅之字少明祖獻之中書令父靖之司徒左長史悅之少厲清操亮直有風檢為吏部郎世說補注一王澄王澄嘗之荊州送者傾邑所別處樹上有鵲巢澄別脫衣著犢鼻上樹探鵲鷇而弄之傍若無人御覽四百八十九王敦字處仲初學記十王敦為太子舍人滎陽潘滔時為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬御覽四百四十三帝舅王愷嘗置酒王敦王導俱往女妓吹笛小失聲愷怒便令黃門毆殺之一坐改容敦神色自若事類賦笛注御覽五百八十敦尚武帝女讓城公主天下大亂天下大亂敦將還臺悉以主嫁時侍婢百餘人配給將士金寶一時棄捐初學記十御覽百五十二元帝用劉隗漸疏導敦將作亂為導沿屈敦上疏曰導動靜顧問起予聖懷文選齊故陸昭王碑文注大寧二年敦將復反溫嶠密啟肅祖陳王敦敦聞曰果為小物所欺乃募有能生得嶠者吾當手拔其舌御覽三百六十七王敦死祕不發喪裹尸以席塗之以蠟埋于齋中諸葛瑤等相縱酒淫樂御覽七百九又七百六十六郭舒大將軍王敦以為從事中郎會敦討劉隗切諫敦大怒曰人中間言卿癡故灸卿眉頭今疾復發邪勿復語也舒曰明公聽舒一言舒聞古之愚也直周昌汲黯朱雲皆不癡也昔堯立訓謗之木舜懸敢諫之鼓公為勝堯舜邪而乃折舒使不得言敦默然也御覽二百三十八羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼內外御覽二百四十杜預在內七年損益不可勝數朝野稱之號曰杜武庫言無所不有御覽四百九十五衛玠字叔寶常以人有不及可以情恕非意相干可以理遣故終身不見其喜慍御覽四百三末句亦見褚淵碑文注衛玠兄璪時為散騎侍郎內侍懷帝玠以天下將亂移家南行母曰我不能捨仲賢而去也玠啟喻深至為門戶大計母涕泣从之臨別玠謂璪曰在三之義人之所重今可謂致身授命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪沒焉御覽四百八十九魯公賈謐參管朝政京洛人士無不傾心渤海石崇之徒年皆長謐並以文才降節事謐共相朋昵號曰二十四友御覽四百七劉寔字子真平原高唐人少貧共糠飯繩索作衣買手繩口誦御覽四百八十四劉寔長不滿七尺精學不倦雖居官職至于皓首手不釋卷同上六百十四山濤字巨源飲酒至八斗方醉帝欲試之乃以八斗飲濤密益其酒濤至本量而止類聚鄭默字思玄轉光祿勳寬沖博愛不以聲色矜人雖卒徒厮養之人皆以恩遇御覽二百二十九陳留阮錄阮孚字遙集咸子也避亂渡江中宗以為安東參軍御覽二百四十九孚風韻疏誕少有門風初為安東參軍蓬髮飲酒不以王務嬰心世說注五瑯琊王襃為車騎將軍鎮廣陵高選綱佐以孚為長史帝謂曰卿既統軍府郊壘多事宜節飲也書鈔案此引作中興書陳留阮錄阮放與从弟孚齊名在銓管之任甚有稱譽性清儉終不治產業為吏部郎不免饑乏王導庾亮以其名士給衣食放由是得立類聚四十八御覽二百十六阮裕裕甚精論難世說注三阮裕少有德行王敦聞其名召為主簿知敦有不臣之心縱酒昏酣不綜其事同上五裕以人不須廣學正應以禮讓為先故終日頹然無所錯綜而物自宗之同上五又四胡母輔之字彥國少高名有王尼者出寒微輔之庾顗王澄等共為美談尼以門役送護軍府輔之等乃齎羊酒詣門吏以聞護軍曰諸名士以羊酒來當有以既入先過尼尼已給府養馬輔之等坐廄下與尼炙羊飲酒而去竟不見護軍大驚乃與尼長假御覽四百七胡母輔之嘗過河南門下飲酒門下騶王子博箕坐其傍輔之叱之使取火博曰我卒也不乏吾事薦之河南尹樂廣召見甚悅擢為功曹御覽二百六十四胡母輔之子謙之醉與父語常呼父字輔之亦不怪也御覽三百七十六胡母輔之等共飲酒散髮裸裎閉戶不接外客類聚謙之常窺輔之厲聲曰彥國老年不得為亦將令我尻背東壁輔之遽呼入與共飲酒其為放達如此御覽三百七十六畢卓字茂世新蔡人少希放達為胡母輔之所知太興末為吏部郎常飲酒廢職比舍郎釀酒熟卓因醉夜至其甕間取酒飲之掌酒者不察謂是盜執而縛之郎往視乃畢吏部也遽釋其縛卓遂引主人燕于甕側致醉而去以上亦見世說注七卓常謂人曰右手持酒杯左手持蟹螯拍浮酒池中便足了一生御覽二百十六末五句亦見類聚二十六溫嶠素知愛卓請為平南長史卒世說注七王尼字季孫洛陽覆沒避亂江夏王澄時為荊州刺史見之欣喜厚供給之尼常歎滄海橫流無安處早喪婦止有一息不用居宅唯畜露車牛一乘每行輒使兒御詣人暮則宿車上無有定處少時澄卒荊州饑荒尼求食不得乃殺牛壞車煮之遂父子餒死御覽四百八十六又七百七十五太山羊曼字祖延頹縱任俠飲酒誕節以上亦見顏氏家訓下依校補四字與溫嶠庾亮阮放桓彝同志友善並中興名臣時州里稱陳留阮放為宏伯高平郗鑒為方伯太山胡母輔之為達伯濟陰卞壼為裁伯陳留蔡謨為朗伯陳留阮孚為誕伯高平劉綏為秀伯而曼為濌伯凡八伯擬古之八儁御覽四百七兗州既有八伯之號其後更置四伯大鴻臚陳留江淵以能食為穀伯豫章太守陳留史疇以大肥為笨伯散騎侍郎高平張嶷以狡妄為猾伯廬陵太守羊曼以狠戾為璅伯蓋擬古之四凶御覽三百七十八光逸字孟祖為博昌小吏令使他往冒雨還令不在逸解衣入寢令被衾中書鈔華譚字令思生未朞而父歿母年十八執節養譚弱冠知名揚州刺史周浚禮辟署从事史愛其才器以為賓友御覽二百六十五譚少以言語清辨知名除太子舍人書鈔譚拜臨海太守弟猷為宣城內史于時正朔所加止江東而已其禮教不出荊揚數郡而譚猷並居畿甸名邦時人榮之書鈔華譚為祕書監時晉陵朱鳳吳郡吳震等以單族二人並有史才白首于衡門後譚知之薦二人擢補著作佐郎並皆稱職也初學記十二御覽二百三十四華譚所友袁甫者字公冑歷陽人少能言議與譚齊名友善太安中甫入洛詣中領軍何勗自言能治刻縣勗曰君子治應多宜何以唯欲宰民何不為一臺職乎甫曰人各有所能否譬如錦繒中之好而不可以為帢稻食中之好而不可以為齏是以孔子曰及其使人也器之苟非大才何能悉備久之除松滋令御覽二百六十六太安中入洛譚與甫書曰誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非高祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而偶翮見鴻漸之輕羽瞻長塗而高鳴知騏驥之迅足御覽四百七孟觀从中亭北出何惲領一萬人以繼之雍圍解文選闕中詩注劉琨石勒攻樂平劉琨自代飛狐口奔安次也文選答魏子悌注祖狄與劉琨中夜而坐相謂曰若四海鼎沸豪傑並起吾與足下相避于中原後琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先人著鞭耳御覽三百五十九劉演于厭次縣築壘拒石勒勒後虜執演以鑊湯煮之御覽六百四十五范陽祖錄建興初祖逖進說曰晉室之亂非上無道而民怨叛也由藩王爭權自相誅滅遂使戎狄乘隙流毒中原今天下既被殘酷遺黎思本人有奮擊之心但悉無所憑倚大王誠能命將帥若使逖等執殳前驅上為國家雪恥下為百姓請命則郡國豪傑必因風嚮起沉溺之民欣于來蘇也掃灑中原清復寰宇此千載之一時願大王圖之中宗于是始欲疆理神州御覽四百六十二祖狄說中宗以掃平中原于是以逖為前鋒都督奮威將軍豫州刺史給布三千疋逖乃徑北渡江中流誓曰祖逖不清中原而復濟者有如此江類聚三十三御覽四百八十祖納字士言少持操行以門寒品能清言明理文義可觀遷東宮舍人又遷右光祿大夫書鈔御覽二百四十三案書鈔引作范陽祖錄祖約為丞相从事中郎于府內為婢所傷司直劉隗奏約患生婢僕身被刑傷約甚慚恥遂解職還家類聚三十五御覽五百郭默為右軍將軍默既遠人樂為邊將不願內轉謂劉胤曰我能衛胡而不用更用虛名者且右將軍主禁兵禁兵不妄出有急方更配給兵將無素是謂棄之定得不亂御覽二百三十八潯陽陶錄陶侃字士行書鈔侃為主郡主簿太守張夔妻病遠迎醫天正寒雪諸綱紀皆難之侃獨曰資于事父以事君夫人當比母安有親病而難迎醫乎乃請行僚屬皆愧之書鈔太傅東海王越以侃為參軍督護江州議軍事書鈔鎮南將軍劉宏以陶侃為長史謂侃曰我昔為羊太傅參軍羊公見語云君後當居身處我今相察亦復然也御覽二百四十九建興元年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘受陶侃節度征蜀賊杜弢大戰賊以桔槔打沒侃二十餘艘人皆沒水類聚七十一御覽七百七十侃為荊州常檢校佐吏若得樗蒲博奕之具投之于江曰樗蒲老子入胡所作外國戲耳圍棊者堯舜以教愚子博者商紂所造諸君並國器何以為此牧豬奴戲若王事之暇患邑邑者文士何不讀書武士何不躬弓談者無以易也世說注二類聚七十四御覽七百五十三陶侃明識過人武昌道上種楊柳人有竊之植于其家侃見而識之問何以盜官柳種子時以為神類聚八十九御覽四百三十二冊陶侃曰公經德秉哲謀猷宏遠文選齊竟陵文宣王行狀注陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪曰君位當上公為八州都督御覽七百二十九陶淡字處靜太尉侃之孫一身孑然無有同產齠齔之時雅好導養謂仙道可祈至年十五六便服食絕穀家累千金僮僕百數終日端拱絕不婚娶居長沙臨湘縣下去家十里于山中立小草屋裁足容身時還家設小床獨坐不與人人共于野得白鹿子馴而養之至七八歲恆與之俱往還後遂乃不復還家御覽三百九十三又五百三又九百六故舊入山候者輒移渡澗莫得近本州舉秀才淡聞遂逃羅縣山中終身不返莫知所終御覽五百三陶潛陶潛為彭澤令督郵察縣縣吏入白當板履而就詣潛曰吾不能為五斗米折腰向鄉里小豎于是挂冠而去書鈔顏延之為始安郡道經尋陽常飲淵明舍自晨達昏及淵明卒延之為誄極其思致文選本誄注太原溫錄溫嶠字太真書鈔嶠有儁朗之資而不拘細行世說注七溫嶠拜太子中庶子嶠在東宮甚見嘉寵僚屬莫與比嶠與阮放等共勸太子遊談老莊不教以經史太子甚愛之以上亦見御覽二百四十五數規諫諷議及獻侍臣箴甚有補益太子時起西池樓觀頗多勞費嶠口疏切諫太子納焉類聚四十九初學記十略王敦欲謗明帝以王孝于眾坐明帝罪云溫太真在東宮久最所知悉因厲聲問嶠謂懼威必與己同嶠正色對曰鉤深致遠小人無以測君子當今諒闇之際有至性可稱敦嘿然不悅然憚其居正不敢害之御覽四百十八肅祖以溫嶠為散騎常侍侍講太寧初手詔曰卿既以令望忠允之懷著于周旋且文清而旨遠宜居深密今欲以卿為中書令朝論亦咸以為宜類聚四十八御覽二百二十敦請嶠為左司馬溫嶠知王敦不可復諫乃潛謀滅之先夙夜綜其府事而附其欲錢鳳敦所信也嶠謂人曰錢世儀精神滿腹嶠有知人之稱鳳聞而悅之深結好于嶠會丹陽尹缺嶠說敦曰京尹輦轂喉舌宜得文武兼之公宜自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳳可用然裁之在公敦思維良久曰無復勝君嶠即苦辭敦不从表補丹陽尹猶懼錢鳳為之奸因敦置酒與嶠別嶠曰違離宇下情戀不已願自起行酒以展歧路之心行酒至鳳未飲嶠因偽醉以手板擊鳳幘為之墜作色曰錢鳳何人溫太真行酒而敢不飲鳳不悅敦以醉而釋之明日鳳曰嶠與朝廷甚密必未可信或懷反噬宜更思之敦曰太真昨醉小加聲色豈得以此相詭貳由是鳳謀不行而得還都御覽四百九十四咸和元年嶠代應詹為江州刺史持節都督平南將軍鎮武昌達于治道軍人稱頌獎勵風俗書鈔案此引作太原溫錄蘇峻反溫嶠推陶侃為盟主侃欲西歸嶠說侃曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公是致命之秋事若克濟則臣主同祚如其不然身雖灰滅足以謝責于先帝今日之事義無旋踵騎虎之勢可得下乎公若違眾獨反眾心必沮沮眾以敗事義旗將迴指于公矣侃無以對遂留不去御覽四百六十二初溫嶠葬豫章朝議以嶠首受顧命功濟社稷宜還陪陵官為起冢太尉侃上停其移葬詔从之至嶠後妻何氏九十便載嶠喪還都詔令葬建平陵北并贈嶠二妻王氏何氏始安夫人印綬云御覽五百五十四高平郗錄郗鑒鑒少好學博覽雖不及章句而多所通綜世說注五中原喪亂鄉人遂共推郗鑒為主與千餘家俱避難于魯國嶧山山有重險中宗初鎮江左假郗鑒龍驤將軍兗州刺史鎮鄒山又徐龕石勒左右交侵鑒收合荒散保固一山隨宜抗對百姓饑饉野無生草時或掘野鼠蟄燕而食之類聚九十二御覽三十五又三百二十郗鑒為太尉雖在公位沖心愈約勞謙日仄誦翫墳索自少及長身無擇行家本書生後因喪亂解巾从戎非其本願常懷慨然咸康五年秋寢疾上疏遜位優詔不許御覽二百七鑒兄子邁字思遠有幹世才略累遷少府中護軍世說注一郗愔郗愔拜給事黃門侍郎苦求外出時吳郡缺朝議欲用愔愔以資輕而少年不宜超登大郡辭讓切至朝廷嘉之為臨海太守在郡優游養志不以事物縈心御覽四百二十四書鈔引作高平郗錄太和四年桓溫請與郗愔等伐燕愔辭此行溫責其不从轉授會稽世說注六愔咸安元年拜都督浙江東五郡諸軍事進位鎮軍開府儀同三司辭不受御覽二百四十三郗愔及弟曇奉天師道世說注七郗超字景興高平人司空愔之子也少而卓犖不羈有曠世之度以上亦見世說注二俶儻高儁籠蓋當時時人為之語曰揚州獨步王文度盛德絕倫郗景興交遊士林每在勝拔又精于理義大司馬桓溫取為參軍溫英氣蓋世罕有所推與超相見常謂不能測也御覽二百四十九累遷中書郎司徒左長史世說注二超年四十一先愔卒超所交友皆一時秀美雖寒門後進亦拔而友之及死之日貴賤操筆為誄者四十餘人其為物所崇貴如此世說注六略類聚二十一御覽四百七郗超沙門支遁以清談著名于時風流貴勝莫不崇敬書鈔郗恢字道胤高平人父曇北中郎將恢為給事黃門侍郎領太子右衛率長八尺美頿䫇風神魁梧烈宗器之以為有蕃伯之望自太子右衛率擢為雍州刺史世說注七書鈔高平郗恢為雍州鎮襄陽所撫恤大得關隴聞譽誘納降附動者千數書鈔吳郡顧錄顧榮字彥先書鈔時吳朝士人入者唯陸機陸雲及顧榮三人而機雲雖有才藻清望不及榮也以南土秀望選補吳王郎中令累遷太子中舍人御覽二百四十六又二百四十八累遷廷尉正同上二百三十一榮遷廷尉平時趙王倫欲誅淮南王允官屬下廷尉議罪榮具明刑理不宜廣濫倫意解賴榮濟者甚眾書鈔御覽二百三十一顧榮齊王冏召為主簿冏自擅威權榮知其必敗唯終日昏酒冏以榮為中書郎御覽二百二十廣陵相陳敏反留顧榮榮與甘草等潛謀起攻敏榮發橋斂舟于南岸敏率萬餘人出不獲濟榮麾以羽扇其眾潰散事平還吳書鈔顧榮琅邪王睿拜為軍司于是朝野皆服中興基時南土士多未盡才用榮又上言陸士光甘季思等凡此諸人皆南金也書奏皆納之顧和字君季榮族子也和二歲失父總角便有清操弱冠知名族父榮雅器之此吾家千里駒也興吾宗者必此子矣御覽二百四十三顧和遷侍中初中興東遷舊章多闕儀服不備而冕旒飾以翡翠珊瑚及雜珠等和奏舊冕十有二旒皆用玉珠今用雜珠等非禮今若不能得玉可用白璇珠成帝于是始下太常治改之書鈔白帖御覽六百八十六康帝即位顧和為尚書僕射以母老固辭詔敕特諭聽暮出朝還其優遇如是尋朝議以臨端右之副不宜處于外更加銀青光祿大夫又遷左光祿大夫初學記十一御覽二百十一又二百四十三丹陽紀錄紀瞻字士遠書鈔歷陽太守沛國武嘏臨亡以家後不立遂手書寄託瞻悉迎接為居宅衣食取足有若骨肉少與陸機兄弟親善機一門被誅瞻復相營恤機女為嫁之由是士稱其篤義御覽四百二十一王敦从中宗出紀瞻覘見大驚出拜道左書鈔瞻為鎮東王左長史丹陽宣城新安三郡中正王常幸其家同乘還府瞻甚見禮遇鄉郡榮之御覽七百七十四瞻勸中宗即位帝不許使殿中將軍韓績撤去御座帷帳瞻叱績曰帝座上應星宿敢有動者斬帝為之改容書鈔瞻拜領軍會錢鳳作逆詔上殿參定謀策事書鈔瞻以病辭領軍乞以常侍衛左右帝曰今日之事豈得如君所論但為朕臥護六軍所益多矣同上瞻為右僕射肅祖嘗居內殿慨然憂天下曰社稷之臣欲得十人如何因史之云君便是一人瞻謝曰臣不敢聞命肅祖曰方欲善語云何復崇謙讓邪瞻以年在懸車自陳告老詔曰豈朕德薄不足以為治乎御覽二百十一瞻為驃騎將軍服物制度一案舊典遣使就拜止家為府書鈔會稽賀錄賀循字彥先會稽人也節操尚厲童齓不群言行舉動必以禮讓行有餘力則精書學由是博覽群書尤明三禮為江表儒宗徵拜博士御覽二百四十三文選王文憲集序注元帝以循為太常而散騎常侍如故循以元卿舊不加官唯拜太常而已中宗踐阼下令曰循冰清玉潔行為俗表加以位處上卿居身服物蓋身而已屋纔庇風雨孤常造其廬特以為賜慨然以六尺床席褥并錢二十萬以表至德初學記十二御覽二百二十八循拜太常與刁協同議先朝舊事以此校循所奏無不符同朝野咸歎循之淵學書鈔賀循拜太常時宗廟始建舊儀多闕或以惠懷二帝應各為世則潁川世數過七宜在迭毀事下太常循議以為禮兄弟不相為後不得以承代為世書鈔循為太子太傅太常如故詔曰循清直履道秉尚真貴居身以沖約為本立德以仁讓為行可躬訓儲宮默而成化御覽二百四十四書鈔循拜左光祿大夫開府儀同三司帝親臨軒遣使持節加左右循病雖口不能言而指麾左右推去章服車駕親幸執手流淚太子親臨者三往還皆拜儒者以為榮書鈔賀循會稽人郡鈴下有楊方者字公迴初為郡威儀少好學有異才以門役在閣下公事之暇輒讀五經鄉邑未之別也內史諸葛恢聞方學召為給使見而異之謂有殊常之才即解役散置左右以門人待由是邦壤敬異方始得周旋鄉賓虞喜兄弟以儒學立名並知拔之後恢欲薦郡功曹于中宗使方共事主簿虞預以薦文美采送示太常賀循循遂向京師稱美之司徒王導辟以為掾方始在都交遊貴人閒縉紳咸厚遇之御覽六百三十一丹陽薛錄薛兼字令長書鈔薛兼與同郡紀瞻廣楊閔鴻吳郡顧榮會稽賀循同志友善號曰五儁初入洛司空張華見而嘆息曰南金也遷丞相長史恪勤王事御覽四百七又四百四十三書鈔案書鈔引作丹陽薛錄薛兼為軍祭酒言于中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召張闓為安東參軍御覽二百四十九強闓為晉陵內史甚有威德轉至廷卿世說注五張敬緒為晉陵內史乃立新豐塘萬九千四尺書鈔劉隗錄劉隗字文連為丞相司直時南中郎王含以族強顯貴驕傲自恣一請參佐及守長二十許人多取非其才隗劾奏文致甚苦事雖被寢王氏深忌嫉之隗之彈奏不畏強禦皆此類也書鈔其議獄事具刑法志彭城劉隗太興初為長兼侍中出補丹陽尹隗雖在外而萬機祕密皆豫聞之類聚五十劉隗从兄疇字王喬才有重名司空蔡謨每歎曰若使劉王喬得南渡司徒公之美選也類聚四十七御覽二百八刁協字元亮除左僕射中興草創制度未立朝臣時無練習舊儀者惟協以久在中朝加性聰明多諳故事朝廷憲體出入威儀唱讚一皆稟于協當時稱為強記御覽二百十一刁協遷尚書令詔曰尚書令刁協抗志高亮才鑒朗博朕甚嘉之初學記十一御覽二百十刁彝于桓溫坐嘲韓博曰君是韓盧後博誤曰卿是韓盧後溫笑曰刁以君姓韓故相問耳他自姓刁那得是韓盧後博曰明公未之思耳短尾者則為刁也一坐推歎焉類聚二十五汝南周錄周顗字伯仁少有重名襲父爵武陵侯拜祕書郎書鈔案此引作中興汝南周錄顗代戴淵為護軍尚書紀瞻置酒請顗及王導等二十人顗荒醉失儀復為有司所奏御覽四百九十七顗拜太子少傅吏部尚書如故顗上疏曰臣退自忖省學不通一經智不效一官止足良難未能守分不悟天監忘臣頑蔽乃使臣內管銓衡外參傅訓質輕蟬翼事重千鈞此之不可不待識而明矣詔曰當副往意不宜沖讓御覽二百四十四書鈔王敦作逆石頭城既陷王師敗績周顗往詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅摧敗以此負公敦憚其正辭不知所答顗與戴淵俱被收路經太廟顗大言曰天地先帝之靈臣忠于社稷王敦無道陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終人以戟傷其口不得復言血流至踵顏色不變士庶聚觀皆為流涕于石頭南門外石上害之御覽四百十八王放害周顗籍其家止見素簏數枚中有故絮御覽七百五又八百十九書鈔周嵩兄顗既被害王敦使人弔嵩嵩曰亡兄天下之人為天下人殺復何弔敦甚銜之御覽五百六十一周訪字士達尋陽人御覽四百三十五中宗之為安東取周訪為參軍在散輩中未之識也府進鎮東訪隨例為參軍時府參軍譙國周訪有罪當死誤收訪訪自列無罪而吏不察訪窮蹙乃身自執使仗奮擊收捕數十人皆被創披散訪得逸走歸府中宗聞大驚怒不問格鬭之罪御覽二百四十九訪遷武昌太守時杜弢作亂寇豫章訪進討弢別帥杜宏張彥等禦訪訪為流矢所中折齒口中流血壯氣益勇先登奮擊臨陣擒彥殺數百人御覽四百三十五周撫馥周撫孫也字湛隱有將略曾作敦掾世說注六周鎮清約寡欲所在有異績世說注一汝南應錄汝南應錄應詹字思遠御覽二百三十八應詹以孝稱年十餘歲祖父母亡家富于財而詹年稚弱乃請宗中單貧者與共為居弱冠知名太宰何劭見而稱之曰質文之士也御覽四百七十六應詹督天門郡天門武陵谿蠻並反詹誅其魁帥餘皆當降自元康以來致令不洽詹召蠻酋破鐵券與盟由是懷化數郡無虞其後州郡有敗唯詹獨保全一境御覽五百九十八應詹遷南平太守永嘉五年洛陽傾覆王澄為荊州不能遣軍詹流涕為澄顯陳大義澄令作檄詹下筆即成書鈔案此引作中興汝南應氏錄陶侃破杜弢應詹亦隨侃在軍城既陷諸將競取諸物詹家至貧而一無所取莫不歡其清介也書鈔王敦徙應詹光祿詹以敦專制自樹優游諷詠一無所標明也書鈔案此引作中興南頓應錄應詹太興三年為後軍將軍御覽二百三十八濟陰卞錄卞壼字望之永嘉中除著作郎文選三十九為卞彬謝修卞忠貞慕啟注卞壼為尚書令與王導等俱受顧命輔幼主成帝即位群臣進璽司徒王導稱疾不朝壼正色于朝曰王公豈社稷之臣邪大行在殯嗣皇未立寧是人臣稱疾之時書鈔王導稱疾不朝而出送郗鑒入臺壼奏導專任無敬御史中丞鍾雅阿撓不糾並宜彈肅後雖事寢不行舉朝憚之書鈔案上二節亦略見初學記十一御覽二百十卞壼為尚書令時貴遊子弟慕王澄謝鯤為達壼厲色于朝曰悖理傷教罪莫斯甚欲推奏之聞者莫不折節書鈔卞壼表曰豈敢干祿位以邀時榮乎文選三十八為齊明帝讓宣城郡公表注蘇峻稱兵壼為尚書令右將軍領右衛峻至東陵口六軍敗績壼乘馬被甲赴賊二子眕盱隨从俱為賊所害贈侍中開府諡忠貞公文選三十九為卞彬謝修卞忠貞慕啟注案此引作濟陰卞錄卞郭除右衛率時胡賊侵逼淮泗中宗求可以式遏邊者公卿舉郭也書鈔劉超劉超字世踰遷中書舍人時臺省初建內外多事超出納書命以忠慎稱加以理身清苦衣不重帛以上亦見初學記十一每上所賜皆固辭曰凡陋小臣橫竊賞賜無德而祿殃咎必至上益嘉焉御覽二百二十二超以中書郎遷為射聲校尉時軍校兵義興人多義隨超因領之號為君子營以實宿衛御覽二百四十二超為左右衛將軍時蘇峻作逆逼遷天子世踰親侍至尊攀轂悲哀賊給馬不肯騎而悲哀慷慨峻聞之不平書鈔熊遠熊遠遷御史中丞尚書郎盧綝入直逢尚書刁協于大司馬門外協醉使綝避之綝以當直不肯迴協令人牽綝墮馬至協車馬而後釋遠奏請免協官詔令白衣領職御覽二百二十六高崧高崧字茂琰廣陵人父悝光祿大夫少好學善史傳累遷吏部郎侍中以公累免官世說注二東阿郭錄郭璞字景純書鈔郭璞太興元年奏南郊賦中宗見賦嘉其才以為著作佐郎初學記十一御覽二百三十四璞以中興王宅江外乃注江賦述川瀆之美文選江賦注郭璞云秦博士典教職禮義所寄也書鈔璞性輕易不恃威儀嗜酒好色或過度其友人干寶常誡之曰此非適性爾璞曰吾所受有本限用之恆恐不盡乃憂酒為患乎御覽三百八十九璞為尚書郎大將軍王敦以璞有才術取為記室參軍璞畏不敢辭書鈔御覽二百四十九案書鈔引作東阿郭錄葛洪葛洪字稚川丹陽句容人御覽七百二十二葛洪好學常伐薪賣買紙墨初學記二十一葛洪赴岣嶁令行至廣州其刺史鄧岱留不聽去洪乃止羅浮山中鍊丹在山積年忽與岱書云當欲遠行尋藥岱得書狼狽而至而洪已亡時年八十一視其貌如平生體亦軟弱舉尸入棺其輕如空衣時咸以為屍解得仙類聚七十八御覽六百六十四洪幼覽眾書近得萬卷自號抱朴子善養性之術撰經用救驗方三卷號曰肘後方又撰玉函方一百卷于今行用御覽七百二十二潁川庾錄庾亮字元規少好黃老能言玄理時人方之夏侯泰初御覽六百十七亮父琛為會稽太守亮少隨父會稽文選三十八讓中書令表注晉國建亮為中書郎同上中宗欽亮名德故申婚姻同上中宗聘亮妹為皇太子妃同上王敦表亮為中領軍同上明帝立王敦表曰中書郎領軍庾亮清雅履正可中書監領軍如故肅祖欲使為中書監上疏曰陛下踐阼復以臣領中書則示天下有私矣云云肅祖納亮言封於昌公同上御覽二百二十初庾亮欲徵蘇峻卞壼不許溫嶠及三吳欲起兵衛帝室亮不聽下制曰妄起兵者誅故峻得作亂京邑也世說注六亮與蘇峻戰于建陽門王師敗績亮于陣攜其三弟懌條翼南奔溫嶠顯宗幸嶠船亮泥首謝罪御覽三百六十四庾亮上疏曰先帝謬顧情同布衣文選五十八褚淵碑文注亮後遷司馬錄尚書事薨文選三十八讓中書令表注庾懌庾冰冰為吳郡蘇峻作逆遣軍伐冰冰棄郡奔會稽世說注七庾冰疏曰臣因循家寵冠冕當世也文選蕭揚州作薦士表注庾冰臨卒謂長史曰吾將逝矣恨報國之志不展死之日斂以時服無以官物也及卒無絹為衾世以此稱之書鈔唐類函冰天性清慎常以儉約自居子襲常貸官絹十匹冰怒捶之市絹還官書鈔庾翼字稚恭時京兆杜乂陳郡殷浩並才名冠世而翼弗之重每語人曰此輩宜束之高閣俟天下平然後議其所任耳唯與桓溫友善在總角之中便相期以終始御覽四百七初學記十八略翼除震威將軍轉西陽太守撫和百姓甚得歡心書鈔翼與燕王書曰令致畫角一雙孔雀眊二枚書鈔庾翼書少時與王右軍齊名右軍後進庾猶不分在荊州與都下書曰小兒輩厭家雞愛野雉皆學逸少書須吾下當北之庾統字長仁潁川人衛將軍懌子也少有令名仕至尋陽太守世說注五庾希字始彥司空冰長子累遷徐兗二州刺史希兄弟貴盛桓溫忌之諷免希官遂奔于暨陽初郭璞筮冰子孫必有大禍唯固三陽可以有後故希求鎮山陽弟友為東陽希自家暨陽及溫誅希弟柔倩希聞難逃于海陵後遷于京口聚眾事敗為溫所誅世說注四桓溫殺庾希弟倩布聞難而逃希弟友當伏誅子婦桓氏女請溫得宥世說注六庾爰之字仲真有父翼風桓溫徙于豫章年三十六而卒世說注四庾闡字仲初潁川人太尉亮之族也少孤九歲便能屬文闡有文章才義識者以為宜綜國史于是召為散騎侍郎領大著作為揚都賦邈絕當時五十四卒世說注三類聚四十八庾闡父東以勇力聞世祖時西域遣一使胡趫䟁勇果自謂無敵晉人不敢與校世祖募求勇敢之士唯東應選遂暴殺胡勇聞殊俗御覽三百八十六桓錄桓彝少孤家貧而性度高豁不以簟瓢屑意年在弱冠便有知人之鑒為宣城太守百姓懷之類聚六蘇峻反桓彝為宣城內史往赴朝廷長史裨惠等咸以宜且案甲以謀須眾力齊集彝厲色曰夫見無禮于其君者如鷹鸇之逐鳥雀今社稷之難而欲逡巡將何以云眾力雖寡義無寧赴長驅往進尋王師敗績彝慷慨流涕皆勸偽通以紓交至之禍如其不然重兵必至彝曰吾受國厚恩不能死節焉能忍辱與之通問如其不濟此即命也遣俞縱進軍左右以力不敵勸縱退軍縱曰吾承桓侯厚遇吾之不可負桓侯猶桓侯不可負國也遂力戰而死峻遣韓晃因進軍討彝力屈被害御覽四百十七桓溫字元子譙國人文選薦譙元彥表注桓溫父被害時溫年十五枕戈寢血經年乃提刀直進手刃仇人類聚三十三溫為琅邪王文學文選薦譙元彥表注溫曾為徐州刺史世說注四李勢盜蜀溫伐勢勢出軍戰于柞橋軍敗面縛請命文選薦譙元彥表注桓溫檄曰幕府不才忝荷戎重文選與陳伯之書注桓溫上疏薦譙秀曰竊聞巴西譙秀植彩貞固抱德肥遯若蒙蒲帛之徵足以鎮靜頹風軌訓囂俗幽遐仰流九服知化初學記二十桓溫步騎四萬自江陵向關中伐偽立荊州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壼漿路側耆老咸泣曰不圖今日復見官軍氏帥苻健以五千人守長安小城時運艱難而關中大饑溫率眾還詔遣侍中黃門忍勞于襄陽犒軍十二年溫進征討大都督司冀諸軍事委以專征之任溫乃合眾治兵七月率眾伐羌十月溫次伊水羌帥姚讓來逆軍屯于北遣使詣溫奉身歸命願敕前鋒小卻當拜路左溫答曰我自脩復中原展敬山陵無豫君事欲來相迫何復求卻于是方軌齊進襄率驍勇萬餘人距水前戰溫命小弟沖及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走溫屯故太極殿前賊周成率眾降溫徙入金墉謁先帝諸陵被侵毀者皆繕復之選陵令守護御覽三百九桓溫授侍中太尉固讓不受旬日之中使者八至軺軒相望于道溫遂親職御覽二百七桓豁桓沖桓遐字伯道溫長子也仕至豫州刺史世說注六桓石虔石虔有才幹有史學累有戰功仕至豫州刺史贈後軍將軍世說注六桓石秀豁第二子也風韻秀徹代叔父沖為江州刺史雖公門貴盛不以榮爵嬰心唯以弋釣為事游覽足樂一邱叔父沖常與石秀共獵登九井山獵徒甚盛觀者傾坐石秀未常屬盼嘯詠而已初學記二十二御覽三百九十二又八百三十二桓嗣字恭祖車騎將軍沖子也少有清譽仕至江州刺史世說注七桓謙字敬祖沖第三子尚書僕射中軍將軍世說注五桓胤字茂祖譙國人祖沖太尉父嗣江州刺史胤少有清操以恬退見稱仕至中書令玄敗徙安成郡後見誅世說注三桓伊字叔夏譙國人湛隱有武幹又善音律為中興第一遷都督江州荊州十郡豫州四郡軍事江州刺史伊到鎮以邊境無虞宜以宰恤為務乃上疏江州虛耗加連歲不登宜併合小縣除諸郡逋米州治宜還豫章詔答移州潯陽其餘皆聽伊隨宜拯撫甚得南土清和御覽二百五十六太原王錄王承字安期少而沖淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以為記室參軍雅相敬重敕子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷詠遺言不如親承音旨王參軍人倫之表汝其師之御覽二百四十九文選王文憲集序注又齊竟陵文宣王行狀注王述字懷祖為司徒王導中兵屬督牙門書鈔述以清介稱康宗為驍騎將軍召補功曹書鈔羲之自會稽王友改授臨川太守王述从驃騎功曹出為宛陵令述之為宛陵多修為家之具初有勞苦之聲丞相王導使人謂之曰名父之子屈臨小縣甚不宜爾述答曰足自當止時人未之達也後屢臨州郡無所造作世始嘆服之世說注五述清貴簡正少所推屈唯以性急為累世說注八王述作會稽太守外白請諱答曰惟祖惟考四海所知過此無所復諱類聚六王坦之字文度選曹將擬為尚書郎坦之聞曰自過江尚書郎正用第二人何得以此見擬御覽二百十五垣之領左衛少有風格尚刑名之學嘗著廢莊論同上二百三十七王愷字茂仁歷吳國內史丹陽尹贈太常世說注四遷丹陽尹為政清整書鈔案亦引太原王錄原闕名不知是愷否姑附此以俟攷王愉坦之子國寶好傾側婦父謝安惡之除尚書郎國寶以為中興膏腴之族唯作吏部不作餘曹郎怨之辭不拜御覽二百十五王國寶因酒坐怒右丞祖台之攘袂喚呼以盤盞樂器擲台之復為有司所彈烈宗詔曰國寶縱肆情性甚不可長台之懦弱非監司體其各免官御覽二百十三書鈔王綏字彥猷愉子也少有令譽自王渾至垣之六世盛德綏又知名于時冠冕莫與為比位至中書令荊州刺史桓玄敗後與父愉謀反伏誅世說注一王綏八世德名繼軌文選百辟勸進今上牋注王濛字仲祖初學記十一王濛少而不羈不為鄉閭所齒晚節克修遂有風流之美譽與沛國劉恢齊名友善時人以濛比袁曜卿以恢比荀奉倩御覽四百七濛恬暢能言名理善隸書與劉恢為中書侍郎太宗輔政濛恢並數侍接對每為入室之賓初學記十一御覽二百二十王濛女諱穆之為哀帝皇后世說注四王蘊字叔仁為吳興太守時郡荒民饑蘊輒開倉賑卹主簿執諫云宜先列表上蘊曰行仁義而敗者尠矣于是以米賑貸賴蘊者十室而八然後具自表聞朝廷以違科免饑民多誦之詔特左遷晉陵太守御覽二百六十一王蘊女諱法惠為孝武皇后世說注四烈宗將納后訪于公卿僕射安曰王蘊地望可與國婚定后既立徵拜金紫光祿大夫御覽二百四十三王恭恭雖才不多而清辯過人世說注五太原王恭為中書令領詹事學問清操過人書鈔王恭嘗宴于司馬道子室尚書謝石為吳歌恭曰居端右之重集宰相之座而放妖俗之音乎並有慚色御覽四百九十一烈宗喪會稽王道子執政寵幸王國寶委以機任王恭入赴山陵故歎曰雖榱桷惟新便自有黍離之哀世說注六王恭敗單馬奔曲阿不堪久騎兩髀生瘡不能復去曲阿人殷礭以船載之為明浦尉所得御覽三百七十二王熙字叔和恭次弟尚鄱陽主太子洗馬蚤卒世說注四王爽字季明恭第四弟也世說注三爽忠孝正直烈示崩王國寶夜開門入為遺詔爽為黃門郎拒之曰大行晏駕太子未立敢有先入者斬國寶懼乃止世說注四爽仕至侍中恭事敗贈太常世說注三荀錄苟勖荀勖徙中書監為尚書令人賀之乃發恚云奪我鳳凰池卿諸人何賀我邪文選古意注苟藩荀組字大章潁川人也弱冠太尉王夷甫見而稱之御覽二百四十三司徒王渾表曰左西屬荀組文義貞素清識見稱宜轉从事中郎御覽二百九懷帝時為侍中特進行太子太保御覽二百四十四為光祿大夫御覽二百四十三荀闓字道明有清稱京師為之語曰洛中英英荀道明大司馬齊王冏辟以為掾御覽二百四十九荀崧字景猷組族子也弱冠太原王濟甚相器重御覽二百四十三崧上疏云國子博士一則應對殿堂奉酬顧問二則以參訓國子書鈔拜右光祿大夫御覽二百四十三荀蕤字令遠遷左丞時桓溫平蜀朝廷欲以豫章封溫蕤謂太宗曰若溫復假王威平定河洛修復山陵將復何以加之遂止御覽二百十三荀羨字令則御覽二百五十四羨為北中郎將徐州刺史時年二十八御覽二百四十一羨年二十八出為徐兗二州中興方伯之少未有若羨者也世說注二順陽范錄范汪字元平少失父年六歲過江依外家庾氏荊州刺史王澄見而奇之以為興范族者必是也人御覽四百四十三范汪家貧好學燃薪寫書寫書既畢誦讀亦竟類聚八十汪博學多通尤善元理書鈔蘇峻反范汪遁西歸時庾亮溫嶠治兵潯陽咸以眾少賊強未敢即路且信使阻絕不如知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱橫滅亡已兆雖強易弱朝廷倒懸宜時進討嶠等納之是日護軍平南二府禮命交至始解褐參護軍事御覽二百四十九汪為吏部郎徙吏部尚書徐兗二州刺史文選為范尚書讓吏部封侯表注初桓溫請范汪為征西長史復表為江州並不就還都因求為東陽太守溫甚恨之汪後為徐州溫北伐令汪出梁國失期溫挾恨奏汪為庶人汪居吳後至姑孰見溫溫語其下曰玄平乃來見當以護軍起之汪數日辭歸溫曰卿來何以便去汪曰有數歲小兒喪往因經亂權瘞此境故來迎之事竟去耳溫愈怒之竟不屑意世說注八范甯字武子慎陽人少好學多所通覽世說注二初學記十一甯解褐除餘杭令在縣興學校養生徒潔己修禮志行之士莫不來宗朞年之後風化大行自中興以來崇學敦教未有如甯者也在職六年遷臨淮太守書鈔御覽二百六十七甯為臨淮太守徵拜中書侍郎專掌西省以職在機近固辭不許多所獻替有益政道御覽二百二十初學記十一類聚四十八甯為中書侍郎時烈宗雅好文學而甯明習五經甚見親愛朝廷擬議輒諮訪之甯指朝士直言無諱御覽二百二十初學記十一求補豫章甯在郡大設庠序遣人往交州採磬石以供學用改革舊制不拘常憲遠近至者千餘人資給眾費一出私祿並取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣書鈔范堅字子常為廷尉秦王典吏邵廣盜官幔合布四十疋依律棄市廣息雲宗二人自沒為官奴婢以贖父尚書議可特聽堅駮之曰此為施一恩于今開萬怨于後顯宗从之正廣刑御覽二百三十一范啟字榮期慎陽人父堅護軍啟以才義顯于世仕至黃門郎世說注三劉惔劉惔字真長少清峻時人以濛比袁曜卿以恢比荀奉倩初學記十一御覽二百二十案劉恢字長升見王隱晉書會稽虞錄虞潭字思奧七為衛將軍貌如不武內堅明有膽決雖屢統軍旅而尠有傾敗書鈔虞嘯父光祿潭之孫右將軍純之子少歷顯位與王廞同之為庶人義旗初為會稽內史世說注八虞悝與弟望並有士操中宗為丞相招延四方之士辟虞為府掾時人謂之百六掾望亦被召恥而不應書鈔案此亦引中興書會稽虞錄晉書悝附忠義虞預字叔寧好學有文才中宗以為記室參軍書鈔預有學有才轉琅琊王常侍書鈔二節亦引中興會稽虞錄陸錄陸曄陸曄童齓中從兄機稱之為陸氏之寶我家不世之才也御覽四百四十三陸玩字士瑤王導郗鑒庾亮相繼殂朝野憂懼咸以為三良既沒國基墜矣于是遷玩侍中司空給羽林四十人玩比陳讓不聽既拜歎息謂賓客曰以我為三公是天下無人也談者以玩為知言類聚四十七御覽二百八陸納字祖言徵拜左民尚書將應召綱紀白曰宜裝畿舫納曰吾家不在此已敕私奴乘駕裝並食糧米無所須也臨發載被襆而已其餘皆封還官御覽四百三十一陸納為吳興太守時衛將軍謝安嘗欲詣納納兄子俶怪納無供辦復不請問乃密作數十人供安至納所設惟茶果而已俶遂陳盛饌珍羞畢具及安去納大怒杖俶四十云汝既不能光益父叔乃復穢我素業御覽五百十二又八百六十七陸納為吳興太守辭大司馬桓溫因問溫曰醉可飲幾酒肉食多少溫曰溫年大來飲酒不過三升便醉日肉不過十臠納後伺閒求入自言外有微禮溫敕而受止有酒一斗鹿肉一盤一坐愕然納曰公近云飲三升民正可二升今有一斗以備餘瀝溫歎服御覽八百六十三書鈔廬江何錄何比干字長卿武帝時為丹陽都尉有陰德嘗獨坐天大雨有一老母詣比干而衣不濡比干怪而敬焉臨去懷中出金冊九百九十枚以授比干曰爾子孫當佩印綬如此冊數御覽四百七十廬江何充字次道御覽二百九充年在童齓伯父邃謂之曰我為兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望御覽四百四十三充為司徒王導諮議參軍御覽二百九王敦以震主之威收羅賢儁辟充以主簿充知敦有異志逡巡疏外及敦稱含有惠政一坐畏敦擊節而已充獨抗之其時眾人為之失色由是忤意出為東海王文學世說注三初庾冰兄弟每說顯宗國有強敵宜須長君顯宗晏駕何充建議曰父子相傳先王舊典忽妄改易懼非長計冰等不从遂立康帝康帝臨軒冰充侍坐帝曰朕嗣洪業二君之力也充對曰陛下龍飛臣冰之力若如臣議不覩升平之世其強正不撓率皆如此御覽四百二十八何準字幼道廬江灊人驃騎將軍充第五弟也雅好高尚徵聘一無所就充位居宰相權傾人主而準散帶衡門不及世事于時名德皆稱之年四十七卒有女為穆帝皇后贈光祿大夫子恢讓不受世說注六何澄字子玄清正有器望歷尚書左僕射世說注八何琦字萬倫遭母憂停柩在殯為鄰火所逼煙焰已交家乏僮役計無从出乃匍匐棺所號哭而已俄而風止火息堂屋一間乃免御覽四百十一琦養志衡門不交人事豐約與鄰鄉共之頻徵不起桓溫與琦登縣略山喟然歎曰此山南有人焉何某真正是也御覽五百三逸民部三褚翜字謀遠少失父母以材藝堪幹立名肅祖即位徵拜屯騎校尉遷太子左衛率御覽二百四十七褚裒字季野河南人也弱冠譙國桓彝見而目之曰褚季野皮裏陽秋裒女即康獻后也徵拜侍中遷尚書裒以后父苦求外出除江州刺史莅政貞素每崇清約常使私僮樵採御覽二百五十六褚裒授衛將軍中書令以中書銓管詔命不宜以親居之固讓類聚四十八御覽二百二十征北大將軍褚裒遣督護王堪迎流民軍次岱陂為石遵所破死傷過半裒還京口聞器聲甚眾問何哭之多左右曰岱陂之役也裒恥恨發疾而薨御覽四百八十七薨贈太傅元穆侯文選褚淵碑文注蔡謨字道明御覽二百八謨拜太常咸康四年臨軒門下奏非祭祀宴饗則無設樂謨奏宜有金石顯宗納焉臨軒作樂自此始也御覽二百二十八書鈔蔡謨為尚書上疏曰八座之任非賢莫居前後選用名資有常孔愉諸葛恢並以清節令才素有名望昔愉為御史中丞臣尚為司徒長史恢為會稽太守臣為尚書郎恢尹丹陽臣守小郡名輩不同階級殊懸今猥以輕鄙超踰等疋上亂聖朝貫魚之次下違群士準平之論豈唯微臣斯亡之誡實貽聖政維塵之累御覽二百十二遷司徒謨固讓曰若我作司徒將為後代哂義不敢拜詔數十下謨章表十餘上孝宗臨軒遣侍中紀璩黃門郎丁篡徵謨謨陳以疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歲甚怪之亟問左右曰所召何人何以至今不來臨軒何時當竟皇太后詔曰必不來者宜罷朝中軍般浩奏曰免吏部尚書江彪官會稽王曰蔡公慠違上命無人臣之禮若人主卑屈于上大義不行于下亦不復知所以為治于是公卿奏送謨廷尉以正刑書謨懼率子弟素服詣闕稽顙到廷尉待罪詔可依舊制免為庶人類聚四十七御覽二百八又四百九十八蔡謨免皇太后詔以謨為左光祿大夫開府儀同三司遣謁者孟洪就加冊命謨上疏陳謝遂以疾篤不行賜几杖門施行馬御覽二百四十三蔡系字子叔濟陽人司徒謨第二子有文理仕至撫軍長史世說注四琅琊諸葛錄諸葛氏之先出自葛國漢司隸校尉諸葛豐以忠強立名子孫代居二千石三國之興蜀有丞相亮吳有大將軍瑾魏有司空誕名並蓋海內為天下盛族御覽四百七十諸葛誕叛遣子靚入質于吳吳亡入洛自以父誕為太祖所斬誓不見太祖叔母琅琊武王妃靚之姊也帝後因靚在姊間往就見焉靚逃于廁帝又逼之靚流涕曰臣不能漆身吞炭復覩聖顏御覽四百八十諸葛恢字道明頤弟也弱冠知名初仕即邱長轉臨沂令值天下亂避地江左于時與潁川荀顗字道明陳留蔡謨字道明俱有名譽號中興三明時人為之歌曰京都三明各有名蔡氏儒雅荀葛清御覽三百六十三世說注四文選王文憲集序注中宗遷恢為會稽太守臨行上為置酒謂之曰今之會稽昔之關中足食足兵在于良守以君有莅任之方是以相屈四方分崩當匡振否運治之所先君為言之恢陳謝因對曰今天下喪亂之餘風俗淩遲宜尊五美屏四惡進忠實之士退浮華之黨中宗深納之焉類聚六御覽二百六十一恢為會稽守二年政清民和書鈔陳郡殷錄殷羨殷融字洪遠陳郡人桓彝有人倫鑒見融甚歎美之著象不盡意大賢須易論理義精微談者稱焉兄子浩亦能清言每與浩談有時而屈退而著論融更居長司徒王導以為右西屬融飲酒善舞終日嘯詠未常以世務自嬰導甚親悅焉累遷吏尚書太常卿卒世說注三御覽二百九書鈔案書鈔引作中興書陳郡郭錄郭自殷字之誤殷浩字淵源識度清遠弱冠與京兆杜乂並有美譽尤善言玄理論難精微長于老易故風流清談者皆宗歸之三府辟皆不就征西將軍庾亮引為記室參軍御覽二百四十九世說注五書鈔案書鈔二引皆作陳郡殷錄浩為亮司馬世說注三浩棲遲積年累聘不至世說注四除侍中安西軍司稱疾不起書鈔建元初庾亮兄弟何充等相尋薨太宗以撫軍輔政徵浩為揚州從民譽也世說注二殷允字子思陳留人太常康第六子恭素謙退有儒者之風歷吏部尚書世說注五殷仲堪仲堪父常疾患經時仲堪衣不解帶數年自分劑湯藥誤以藥手拭淚遂眇一目世說注七殷仲堪少好學能清言善屬文人士咸欽愛之以孝行稱烈宗聞其名為太子中庶子甚相知悅御覽二百四十五殷仲堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義御覽九百六初仲堪欲起兵密邀覬覬不同楊廣與弟佺期勸殺覬仲堪不許世說注一顧悅字君叔晉陵人初為殷浩揚州別駕浩卒上疏理浩或諫以浩為太宗所廢必不依許悅固爭之浩果得申物論稱之後至尚書左丞世說注二顧愷之博學有才氣為人遲鈍而自矜尚為時所笑世說注三會稽孔錄孔愉字敬康少與同郡張茂字偉康丁潭字子康俱知名號曰會稽三康御覽三百六十三愉以討華軼功封餘不亭侯初愉少時嘗得一龜經餘不亭放龜溪中龜中流左顧者數過後以功封餘不亭侯以鑄印而龜左顧更鑄亦然印工以聞愉愉悟乃取佩初學記二十六御覽二百司徒王導將以趙冰為中護軍孔愉謂導曰中興以來處此官者周伯仁應思遠今誠乏才豈可以趙冰居之其秉正不撓皆此類也御覽二百四十孔坦字君平以才名獨步補東宮舍人書鈔案此引作會稽孔錄孔嚴字彭祖會稽山陰人父儉黃門侍郎世說注五嚴補大中正時東海王奕信用群下上疏求海鹽錢塘以水牛牽埭稅取錢直嚴啟宜寢表帝詔曰奕謂此適民無損害豈奪惠䘏之旨也省所啟敬納忠規御覽六百二十七嚴有才學歷丹陽尹尚書西陽侯在朝多所匡正為吳興太守大得民和後卒于家世說注五孔演字元舒中宗命為安東參軍專掌記室時書命殷積演每稱職御覽二百四十書鈔引末句作會稽孔錄演晉國初建與庾亮俱補中書侍郎肅宗之在東宮孔演領太子中庶子于時中興肇建庶事草創演經學博通又練識舊典朝儀軌制多取正焉由是元明二帝並親愛之初學記十一御覽二百二十又二百四十五孔衍為廣陵郡時人為之寒心而衍不形于色郡雖鄰接西賊猶教誘後進不以戎務廢業書鈔張茂初起義討賊陳武一郡用全中宗初鎮召為掾屬中興累遷至太子右衛率出為吳國內史為沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書襃歎追贈太僕卿御覽四百三十九丹陽陶錄陶回字恭之王導以回有器幹擢拜北軍中候御覽二百四十大將軍王敦命為參軍轉州別駕在府稱職書鈔案此引作丹陽陶錄陶回拜領軍將軍加敵騎常侍性方範不畏強禦丹陽尹桓景頗以佞事司徒王導導甚昵之回常慷慨謂景非正人不宜親狎會熒惑守南斗經旬王公語回曰南斗揚州分而熒惑守之吾常遜位以厭此讁回答曰公以明德作相輔弼聖主當親忠貞遠邪佞而與桓景造膝熒惑何由退舍導深愧之御覽二百三十九又四百二十八又四百九十一陳郡謝錄謝鯤字幼輿弱冠知名植中朝大亂長沙王乂輔政親媚小人忌害君子時疾鯤名譖之乂遂執欲鞭之鯤解衣伏鑕神無動容乂異而釋之又無喜色御覽六百四十九太傅東海王越聞其名辟為掾于時懼胡來攻城多蓄薪柴鯤家僮載取官槀除名書鈔案此引作中興書陳郡謝錄謝尚字仁祖司徒左西屬為會稽王友御覽二百四十八書鈔尚為建武將軍江夏相世說注五謝奕字無奕陳郡陽夏人祖衡太子少傅父裒吏部尚書奕少有器鑒辟太尉掾郯令世說注一奕自吏部郎出為晉陵令世說注七累遷豫州刺史世說注一謝安字安石年四歲桓彝見而嘆曰此兒風神秀徹後當不減王東海總角神識深敏氣宇條暢丞相王導知之由是著名御覽三百八十四安元居會稽與支道林王羲之許詢共游處出則漁弋山水入則談說屬文未嘗有處世意也世說注四東甌沃壤名士各樂居之太傅謝安未仕時亦居東土共王羲之孫綽李充許詢道林皆文義冠世共相友昵御覽四百七于恭為中書令謝安石上疏曰王恭超登清任當虛心乘理文選王文憲集序注于時氐賊強盛侵寇無已朝議求文武良將可以鎮靖北方者衛大將軍安曰惟兄子玄可任此事中書郎郗超聞而嘆曰安違眾舉親明也玄必不負舉才也于是徵還拜建武將軍兗州刺史領廣陵相監江北諸軍事御覽五百十二世說注四文選和王著作八公山詩注安出鎮廣築新城而居之謝安築埭于新城北百姓賴之故名召伯埭御覽七十三謝萬字萬石太傅安弟也才氣高俊蚤知名歷吏部郎西中郎將豫州刺史散騎常侍世說注二萬才器儁秀善自衒曜故致有時譽兼善屬文能談論時人稱之世說注三又五謝萬少而才器儁秀太宗聞其名取為鎮軍从事中郎御覽二百四十九萬之為豫州氐羌暴掠司豫鮮卑屯結并冀萬既受方任自率眾入潁以援洛陽萬矜豪傲物失士眾之心北中郎郗曇以疾還彭城萬以為賊盛致退便向還南遂自潰亂狠狽單歸太宗輔政責之廢為庶人世說注五萬器量不及安石雖居藩任安在私門之時名稱居萬上也世說注五升平五年詔曰前西中郎將謝萬才義簡亮宜居獻替其為散騎常侍類聚四十八萬為尚書令薨博士議諡曰萬無他才望直以宰相弟遂居清顯妄自夸擬曾無慚德案諡法因事有功曰讓貪以敗官曰墨宜諡曰讓墨公朝議直曰襄公御覽四百九十二謝石字石奴世說注三謝石上疏曰尸素朝端忽焉五載文選褚淵碑文注謝石遷尚書令石上表以腳疾不敢朝拜乞依故尚書王彪之例于府總攝詔聽之書鈔謝安弟石歷尚書令薨年六十二石無他才望直以宰相弟兼有大勳遂居清顯而聚斂無厭取譏當世御覽六百二十七世說注三文選奏彈王源注引謝石以有大勳遂居清顯二句作何法盛陳郡錄謝玄字幼度進號冠軍將軍加領徐州牧還于廣陵以功封東興縣侯太元八年秦主苻堅傾國大出眾號百萬先遣苻融慕容暐張蚝苻方四師至潁口梁成王先等守洛澗詔加衛將軍安為征討大都督玄為前鋒都督徐兗青三州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石从弟輔國將軍琰西中郎將桓伊龍驤將軍檀元等拒之眾凡八萬玄先遣廣陵相劉牢之五千人直指洛澗即斬梁成及成弟雲步騎崩潰爭赴淮水斬首萬級生擒五千餘人十月苻融進屯壽陽玄與琰等選精銳八千人決戰肥水南射傷苻堅臨陣斬苻融俘獲萬計得偽輦及雲母車其餘寶器山積錦罽萬端牛馬驢騾駱駞十萬疋封康樂公御覽三百九文選十九述祖德詩注案選注引略作陳郡謝錄兗州既平謝玄患水道險澀糧道艱難壅呂梁水立七埭以利運漕御覽七十三白帖謝談字瑗度安少子也安以琰有軍國才用出為輔國將軍以精兵八千人拒氐破賊有勳焉進號征虜左僕射領詹事書鈔文選齊故陸昭王碑文注案均引陳郡謝錄謝琰為會稽內史叔五郡事隆安四年孫恩復寇浹口入餘姚上虞進及邢浦上黨太守張虔碩戰敗于邢浦去山陰北三十五里人情震懼群賊銳進咸以宜持重嚴備且列水軍于南湖又應分軍設伏以待之琰不聽外白賊至時尚未食琰曰要先滅此寇而後食耳跨馬而出摧鋒陷陣廣武將軍桓寶為前鋒果敢能戰殺賊甚多而塘路迮狹魚貫不聚賊自艦中傍射前後斷絕琰至千里亭與二子肇俊俱被害寶亦死之御覽三百二十三書鈔謝朗博涉有逸才善言玄理世說注三謝沈字行思時朝議七廟毀于是徵太學博士用質凝滯書鈔沈為祠部郎何充庾冰並稱沈有史才遷大著作以上亦見御覽二百三十四郎撰晉書三十餘卷時年五十二沈先著後漢書百卷及毛詩漢書外傳及詩賦文論皆行于世其才學在虞預之右書鈔王遜王遜為廣州刺史民人謁者多使作金刺通名妻詰之曰何先清而後濁也書鈔毛璩毛璩為譙王司馬時海陵縣地多菰蒲處所幽邃亡戶保之璩請討放火而進天既旱地皆菰封封燃叛人走出近得萬戶御覽九百九十九劉遐字正長廣平人性果毅便弓馬遭天下亂自遐自為隖主攷抄日至無時不戰遐每奮擊直入賊軍陷堅摧銳鄉人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼時人號為關羽張飛御覽四百三十五鄧遐鄧遐氣蓋當時文選齊故安陸昭王碑文注陳壽陳壽為司徒仰理萬機俯澄邦教類聚太康孫錄孫統字承公太原人善屬文時人謂其有祖楚風仕至餘姚令世說注五承公少誕任不羈家于會稽性好山水及求鄞縣遺心細務縱意游肆名阜勝川靡不歷覽世說注七孫騰統子也博學歷中庶子廷尉世說注五孫綽字興公太原中都人少以文稱歷太學博士大著作世說注二綽為章安令稍遷散騎常侍領著作郎尋轉廷尉卿著作如故卒于時才筆之士綽為其冠故溫王郗庾諸公之薨必須綽銘而後刊石文選游天台山賦注初學記十二孫盛字安國太原中都人博學強識歷著作郎瀏陽令庾亮為荊州以為征西主簿世說注二盛歷散騎常侍祕書監常領著作御覽二百三十四加給事中篤尚好學自少及長常手不釋卷既居史官乃著三國陽秋初學記十二御覽二百三十三孫盛年十歲避難度江及長博學善元理于時殷浩擅名一時無與抗論者唯盛嘗詣浩談論對食奮塵尾毛悉落飯中食冷而復煖者數四至暮忘食理竟不定御覽六百十七孫盛以祕書監領著作干寶以散騎常侍領著作孫綽以散騎常侍及陳壽並大著作書鈔案此引作中興太康孫錄孫潛盛長子也豫章太守殷仲堪下討王國寶潛時在郡逼為咨議參軍固辭不就遂以憂卒世說注二干錄干寶字令升新蔡人祖正吳奮武將軍父瑩丹陽丞寶少以博學才器著稱世說注七寶始以尚書郎領國史遷散騎常侍卒撰晉紀起宣帝迄愍五十三年評論切中咸稱之善文選晉紀論武帝革命注干瓚以穆帝時為大將軍誅死史記集解序注鄧騫字長真長沙人也御覽二百六十三譙王丞為魏乂所敗乂求騫甚急鄉人為懼騫笑曰欲用我耳乃往詣乂喜謂曰君可謂古之解揚也以為別駕同上長沙鄧粲高潔著名桓沖召粲為別駕粲起就職時南郡劉尚公亦治操不仕粲既就職尚公語粲曰卿道廣學深眾所推懷忽然改節誠失所望粲笑答曰足下可謂有志于隱而未知隱之為道朝亦可隱市亦可隱初在我不在于物尚公無以難之粲名譽解半矣御覽二百六十三習鑿齒字彥威襄陽人少以文稱善尺牘桓溫在荊州辟為从事歷治中別駕遷榮陽太守世說注二溫辟鑿齒為別駕溫出征伐齒或从或守所在任職每處機要莅事有績善尺牘論議溫甚器遇之任職十年書鈔陳郡袁錄袁瓌字山甫為國子祭酒時屢喪亂禮教陵遲上疏求立學徒帝从之國學之興自瓌始也書鈔案此引作陳郡袁錄袁耽字彥道少有才氣倜儻不羈為士類所稱王導引為參軍書鈔案此同上濟陽江錄江逌殷浩北伐江逌為長史及丁零反叛浩軍震懼姚襄去軍十里結草為營方欲擊浩浩甚懷憂令逌伐之逌曰今兵非不精而眾少于羌且壍柵甚固難與校力乃取數百雞以長繩連之腳皆繫火一時驅放以兵遏後群雞駭散一時飛過壍並集于羌營火皆燃因其驚亂縱兵擊之襄遂摧退御覽三百二十一又八百六十八初學記二十五類聚八十引皆略江逌為侍中時孝宗欲于後園立池苑逌諫以強賊未滅宜務軍備當存儉約以率群下上即納之也御覽四百五十三江灌字道群陳留人僕射虨从弟也有才器與从兄逌名相亞仕至尚書中護軍世說注五江繪江繪為御史中丞既到職彈奏無所屈撓時元顯專政多行驕橫繪密啟之書鈔案此引作濟陽江錄車胤車胤為廣州刺史居官貪濁士豪等以斃之書鈔劉牢之太元九年慕容垂復圍鄴謝元遣劉牢之救之十年至鄴垂逆戰而敗遂撤圍遁牢之追之劉牢之至五橋澤中敗績兵士殆盡牢之馬超五丈澗得免御覽七十二元興元年桓玄反牢之素惡元顯欲假玄以除之劉牢之屯洌州桓玄至于湖遣牢之族舅何睦說曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰若翻然改圖唯理是宅則與金石等固名與天壤俱無窮哉牢之得說詣玄請降御覽四百六十二張軌張駿舞八佾建豹尾所署官一擬王者書鈔張天錫後以貧拜廬江太守薨贈侍中世說注二孫晷字文度吳人少佃于野時年饑穀貴人有生刈其稻者晷見而避之既而刈一擔自送焉鄉人感愧終日屢空怡然自足辟命皆不就妻虞預女也少稟伯喜風共安儉約御覽五百三又八百三十九顏含字宏都琅琊人含次嫂樊氏老而失明含奉養必束帶躬親嘗省嫂病困須得蚺蛇膽為藥而求不能得含憂歎累日平晝獨坐忽有一童子持一青囊授含含開視乃蛇膽也童子逡巡出戶化為青鴻飛去得膽藥成嫂病即愈御覽四百十六類聚九十一略琅琊顏含拜光祿大夫門施行馬賜床帳被褥敕大官四時致膳固辭不受于時論者以王導帝之師傅名位隆重百寮宜為降禮太常馮懷以問于含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務書鈔烏程吳逵往經饑饉父母兄嫂及群从小幼之親死十有三人逵病篤鄉里咸葦裹布而埋之親屬皆盡存者唯逵夫妻而已家徒四壁晝則傭賃夜還燒磚伐木夜在山草屢遇虎虎下道避之夫妻勤苦期年中成七墓十三棺鄰里嘉上其志義葬日悉出助之太守張崇之義其志行加羔雁之禮命補功曹吏逵以門寒固辭不就御覽四百十一易雄字與長舉孝廉為州主簿遷別駕自以寒門不宜處其位解位後為舂陵令書鈔易雄仕郡為主簿張昌之亂執太守萬嗣將斬之雄對賊爭論曲直賊怒叱使牽雄斬之雄趨出自若賊又呼問之雄對如初如此者三敗乃舍之嗣由獲免雄遂知名書鈔易雄長沙瀏陽人為舂陵令聞王敦作逆譙王丞檄至雄馳檄遠近列敦罪惡俄而王師敗績敦得肆暴收雄姑熟以檄示焉雄曰有之惜雄位微力弱不能救國難安以生為今日即戮得為忠鬼乃其願也御覽四百十七羅企生字宗伯豫章人殷仲堪初請為府功曹桓玄來攻轉咨議參軍仲堪多疑少決企生深憂之謂其弟遵生曰殷侯仁而無斷事必無成成敗天也吾當死生以之及仲堪走文武並無送者唯企生从焉路經家門遵生紿之曰作如此分別何可不執手企生回馬授手遵生便牽下之謂曰家有老母將欲何行企生揮泣曰今日之事我必死之汝等奉養不失子道一門之內有忠與孝亦復何恨遵生抱之愈急仲堪于路待之企生遙呼曰今日死生是同願少見待仲堪見其無脫理策馬而去俄而玄至人士悉詣玄企生獨不往而營理仲堪家或謂曰玄性猜急未能取卿誠節若遂不詣禍必至矣企生正色曰我殷侯吏見遇以國士不能共殄醜逆致此奔敗何面目就桓求生乎玄聞怒而收之謂曰相遇如此何以見負企生曰使君口血未乾而生此姦計自傷力劣不能翦定凶逆我死恨晚爾玄遂斬之時年三十有七眾咸悼之世說注一鄧攸字伯道為石勒參軍勒過泗水攸與鄉人河東陳嘏平陽馬恬共謀叛勒破車以牛馬負妻子入草中又遇賊掠牛馬去攸語妻曰吾弟早亡唯有一息今當步走兩兒恐盡死不如棄我兒抱弟子遺民婦乃从之御覽四百十六攸棄兒于草中兒啼呼追之至莫復反攸明日繫兒子樹而去遂渡江至尚書左僕射卒弟子綏服攸齊三年世說注一鄧攸為吳郡守輒賑䘏貸貧書鈔吳隱之子處默濮陽人少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居隱之每哭康伯母輒泣涕悲不自勝既而語康伯曰汝後若居銓衡之職當用如此輩人及康伯為吏部尚書因進用之遂歷清望初學記十一類聚二十御覽四百十二又四百四十三隱之太元中以國子博士為太子右衛率御覽二百四十七廣州北界有一水名貪泉父老云飲此水者皆使廉士變貪御覽四百九十二舊云往廣州飲貪泉失廉潔之性吳隱之為刺史自酌貪泉飲之題石門為詩云石門有貪泉一飲重千金試使夷齊飲終當不易心世說注一初學記八虞喜字仲寧好學博古中宗初鎮江左上疏薦喜公車徵不至司空賀循每一詣喜輒經信宿云不能測也康帝以為散騎常侍又不起永和初時禘太廟應有遞毀尚書郎徐禪詣喜講所著數十萬言御覽五百三高陽許詣字玄度寓居會稽司徒蔡謨辟不起詢有才藻善屬文能清言于時士人皆飲愛之文選江掩雜體詩注書鈔高陽許詢字元度丹陽許元字遠游並養高不仕詢有才藻能清言元山居服食志求仙道遊會稽臨海山誓不歸家乃與婦書令改適後入剡深山莫知所止或以為昇仙御覽五百三氾毓字稚春北海廬人世說補一注杜夷字行齊以儒學稱中宗以為丞相祭酒中興初皇太子凡三至夷舍執經問義初學記十御覽二百三十六杜夷素以儒稱秉操貞素中宗以為儒林祭酒類聚徐邈字仙民東莞姑幕人也以東州儒素少好學尤善經傳時烈宗始覽典籍招延禮學之士後將軍謝安舉邈應選補中書舍人專在西省撰正五經音訓學者宗之每預顧問輒有獻替多所補益烈宗甚愛之初學記十一御覽二百二十二建元中為太子前衛率御覽二百四十七范宣字宣子陳留人也年十歲能誦詩書嘗以刀傷手捧手改容人問痛邪答曰不足為痛但受全之體而致毀傷不可處耳家人以其年幼而異焉御覽三百七十范宣八歲後園挑菜誤傷指大啼問痛邪答曰非為痛身體髮膚不敢毀傷是以啼也同上四百十二宣少好學手不釋卷博覽眾書善三禮同上三百八十四范宣少尚隱遁博綜眾書徵辟並不應雖閑居屢空常研講為業諷誦之聲有若齊魯同上五百三宣家至貧罕交人事豫章太守殷羨見宣茅茨不完欲為改室宣固辭羨愛之以宣貧加年饑疾疫厚餉給之宣又不受世說注一逵不遠千里往豫章詣范宣宣見逵異之以兄女妻焉世說注七曹毗字輔佐譙國人魏大司馬休曾孫也好文籍能屬詞累遷太學博士尚書郎光祿勳世說注三李充字宏度江夏郢人也祖康父矩皆有美名充初辟丞相掾記室參軍善箴銘也以貧求郯縣遷大著作中郎以上亦見世說注二于時典籍混亂充刪除煩重以類相从分作四部甚有條貫祕閣以為永制御覽二百三十四書鈔充母衛氏廷尉展之妹也充少孤母聰明有訓又善楷書妙參鍾索世咸重之充從兄咸亦善書御覽七百四十九李軌字弘範江夏人仕至尚書郎世說注八案經典釋文易書詩三禮左氏公羊老莊軌皆有音謂為東晉祠部郎中都亭侯晉書何以不載故姑附充後以俟攷伏滔字玄度平昌安邱人少有才學舉秀才大司馬桓溫參軍領大著作掌國史游擊將軍卒世說注二董威每得殘碎繒輒結以為衣號曰百給類聚七十六任旭字次龍臨海人操立清儉不染流俗郡將蔣秀請為功曹治官貪穢每不奉法旭正色苦諫秀既不納旭乃謝去閉門講肄養志而已久之秀坐事被收旭于獄狼狽營救躬自扶送秀慨然歎曰任功曹直人吾違其讜言以至于此復何言哉御覽二百六十四郭文字文舉避亂上餘杭大辟山縣令顧颺親迎文舉歸贈一無所受颺以文舉山行或須皮衣舉韋袴褶一具文舉不納使者置衣室中而去文亦無言袴褶爛于戶內書鈔御覽六百九十五孟陋字少孤少而貞潔清操絕倫口不言世事少時或漁弋雖家人亦不知所之太宗輔政以為參軍不起桓溫躬往造焉或謂溫宜引在府溫歎曰會稽王不能屈非敢擬議也陋聞之曰億兆之人無官者十居其九豈能高士哉我病疾不堪廿相王之命非敢為高也御覽五百四翟湯字道淵尋陽人篤行純素始安太守干寶與湯通家遣船餉之敕吏曰翟公廉讓卿致書訖便委船還湯無人送致乃更貨易絹物因寄還寶寶本以惠而反煩之益愧嘆焉御覽四百二十五又八百十七翟湯耕而後食凡有饋贈一無所受庾亮薦湯以國子博士徵不起湯子莊字祖休遵湯之操雅好弋釣及長不復獵人或問莊曰同是害生之道而先生止去其一何也莊曰獵自我釣自物故先節其甚者且貪餌吞釣豈我哉時人以為知言晚節亦不復釣端坐蓽門啜菽飲水徵辟皆不就莊子矯矯子法賜並徵不至世有隱行御覽五百三郭翻字長翔武昌人少有志操不交世事家于臨川唯以魚釣射獵為娛常以車獵去家百餘里道中逢一病人以車送之徒步而返以上多依書鈔校補庾亮薦公車徵不就乘小船歸武昌安西將軍庾翼以帝舅之重躬往逼翻欲強起之翻曰人各有所短翼以翻船狹小欲引就大船翻曰使君不以名鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入其船中終日而去御覽五百三又七百六十八事類賦舟注書鈔郭翻少有忠操居貧無業起往古荒田先立表題經年無主然後乃作將熟有認之者翻悉推與之縣令聞以稻歸翻翻不受類聚六十五案類聚原本無末十字此依唐類函類聚本補郭翻墜刀于水路人為取翻仍以與之路人不取至于三四固辭翻曰爾尚不取我豈能復得路人曰我若取此將為天地鬼神之所責矣翻知其終不受復沉刀于水路人悵然乃復驚汲為取之翻于是不逆其意十倍刀價與之其廉不受惠皆此類也御覽三百四十五劉驎之子子驥一字遺民好遊于山澤志在存道常採藥至名山深入忘返見有一澗水南有二石囷一囷開一囷閉或說囷中皆仙方祕藥驎之便欲尋索終不能得桓沖請為長史固辭居于岐陽人事往來無不投止驎之自供給人人豐足凡人致贈一無所受御覽五百四劉驎之南陽人少有信義去家百餘里有一獨媼病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有病故往候之值其命終乃身為治棺殯送之其仁愛惻隱如此御覽四百十九戴逵字安道譙國人少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜總角時以雞卵計溲白瓦屑作鄭玄碑又為文手自刻字文既綺藻器亦妙絕時人莫不驚嘆知其深敏御覽三百八十四又五百四書鈔逵不樂當世以琴書為娛不遠千里御覽五百七十七太宰武陸王晞聞其能琴使人召焉逵對使者前打破琴曰戴安道不能為王門伶人以上亦見類聚四十四御覽五百四晞怒乃更引其兄述述亦能樂聞命欣然操琴而往事類賦注琴累遷散騎常侍郡縣逼乃逃去吳國內史王詢有別館在虎邱山乃潛住詢山中謝玄王詢並表逵忠烈備禮徵不至御覽五百四龔元之字道元潛處陋巷未嘗出入公門人有致餉一無所受武陵太守孫放薦元之詔以為散騎常侍郡縣逼苦辭不行前後四徵一皆不降御覽五百四淳于智字叔平濟北人上黨鮑瑗家多喪疾貧苦或謂之曰淳于叔平神人也何不試就卜瑗乃令智作卦成曰君謂宅東北有大桑樹君徑至市入門數十步當有一人將新馬鞭者就請還買以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年後浚井得錢千萬銅鐵雜器復可二十餘萬于是家業用展病者亦愈御覽四百八十四謝奕女道韞王凝之妻也凝之弟獻之嘗與賓客談議辭理將屈道韞遣婢白獻之曰欲為小郎解圍乃以清綾步障自蔽申獻之前義客不能屈御覽六百十七桓玄錄桓玄字敬道玄出姑蘇大築府第文選南州桓公九井作注案并上引作何法盛桓玄錄詔桓玄曰蕃衛王家垂固萬葉文選曲水詩注詔桓玄為楚王備九錫之禮玄到姑蘇朝臣勸進玄遂篡位也文選解尚書表注桓玄左右稱玄為桓詔桓徹諫曰詔者施于辭令不以為稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法玄曰此詔已行今宜敕罷之御覽五百九十三桓玄聞義軍起斬其二將志慮窘塞力與臧道士推算數厭勝之術御覽四百八十六劉道規及下邳太守孟懷玉等與桓玄戰于崢嶸洲義軍乘風縱火盡銳爭先玄眾大潰燒輜重夜遯玄故將劉統馮稚等聚黨四百人掩沒潯陽城建威將軍劉懷肅討平之其黨自相斬以降玄入江陵太守馮談勸使更下戰玄欲步出漢川投梁州而人情崩阻不可復合益州刺史毛璩弟璠卒璩使其从孫祐之參軍費恬送璠喪葬江陵璩弟子修之為玄屯騎校尉玄計窮欲走漢中修之誘以入蜀遂與石康等乘艦泝江數十里恬與祜之迎擊玄益州督護馮遷斫玄玄曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬玄首並石康等五級庾頤之及殿中監萬蓋丁仙期皆死之玄年三十六息昇六歲云我是豫章王諸軍勿見殺遂送至江陵市斬之御覽三百二十三桓玄強與人博奕取其田宅御覽七百五十四王機廣州人背刺史郭訥迎王機為刺史遂入廣州訥乃持節出避之機入城就訥求節訥曰昔蘇武不失節人以為美今寧可以與賊乎天朝所假等威義不可得相與自可遣兵來取之機慚而止書鈔御覽六十一王機纂廣州懼王敦來討杜弢在鬱林機與結好杜弢大破桂林賊還遇王機于道機勸弢取交州弢素有意乃執機節曰節當相與迭特何可獨捉機遂以節與弢于是機與弢及溫劭劉沈等並反後並為陶侃所殺書鈔御覽六百八十一案書鈔引杜弢作杜弘王矩字令式美容貌每出行觀者盈路御覽三百七十九蘇峻蘇峻作逆與祖渙許柳等將萬餘人出橫江連船東渡時遇西風既濟半江中忽更東風吹船還西岸峻憙曰是天助我固將志也御覽七百六十八孫恩者亦名靈秀琅琊人孫秀之族也世奉事五斗米道恩叔泰字敬遠師事錢塘杜子恭為弟子恭有內術黨就人借瓜刀其主求之子恭曰當相送還刀主行至嘉興有魚躍入船中破魚得瓜刀其為神效往往如此御覽三百四十五書鈔孫恩敗以囊簏盛嬰兒投之于外而告之曰賀汝先登仙堂我尋而後就汝御覽七百四胡錄胡者北夷之總名也御覽七百九十九北狄其地南接燕趙北至沙漠東漸九夷西界六戎世世自相君臣不稟中國正朔御覽八百胡俗以部落為種類其入居塞者有屠各種最豪貴故得為單于統領諸種文選檄吳將校部曲文注又與陳伯之書注建興四年劉載使劉曜寇長安文選勸表注案此引作胡錄劉粲悉害盧諶父母文選答盧謀注二十五案此引作何法盛晉錄泰寧元年五月大迴風吹劉曜太廟瓦垣外數十步其灓梁栱桷無離者瓦亦不毀曜素服五月繕治之御覽七百六十七劉曜進兵圍洛陽百餘日不克石勒謂徐晃曰曜以疲卒十萬圍堅城今以我初銳擊其衰怠其勢必舉十二月勒兵四出晝夜兼行六日行千里至洛陽與曜大戰遂執曜書鈔石勒與李陽相近陽性剛悔每歲與爭漚麻池共相撲打互有勝負勒既貴召陽至引入言及平生酒酣牽陽肘曰卿年老臂中故有力不頗復與人鬭邪孤往數得卿尊拳卿亦快遭孤毒手因大笑賞賜甚厚即日拜陽奉車都尉除始興太守勒治門閤至峻有醉胡乘馬徑入府門勒問門吏馮翥向走馬入門是何人而不憚白翥見問惶遽誤對忘諱曰向有醉胡乘馬馳來即已訶問胡人難與語非小吏所制勒笑曰胡正自難可與言以上亦見類聚十九其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧邪朝服何以壞惡坦性疏謬對曰頃遇羯胡資財蕩盡是以窮獘勒大笑曰羯賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問御覽三百九十一石虎有所平克不復料其善惡或盡坑斬使無孑遺御覽四百九十二冉閔殺石鑒及幸數萬人于時人有高鼻多鬚者無不濫死御覽三百七十四苻健洪第三子健陰圖關中陽使其徒種麥示無西意以上亦見類聚八十五有微知其計不肯耕種者健殺之後十餘日帥眾西行到孟津作作浮橋健使弟雄步騎五千人入潼關兄子青入軹關指河誓曰若事不捷汝死河北我死河南為鬼無相見也御覽四百八十苻健凶淫暴虐常露刃張弓椎鉗鋸鑿殺人之具備置左右御覽三百四十七又四百九十二又七百六十三苻堅率眾五十萬向壽春謂融曰晉人若知朕來便一時還南固守長江雖百萬之眾無所用之今祕吾來令彼不知彼顧江東在此必當戰若其潰敗求守長江不復可得則吾事濟矣乃祕不言堅自來于是以小將旗列屯肥北晉征虜將軍謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等並阻水南一時涉渡肥水融曰及吳未成列擊之必克也堅曰不然我長于步彼便于水今捨步入水是以所短擊其所長非良策矣可須彼過水一時擊之彼既背水進退無術乃可盡殺然後船舫渡江直指會稽觀禹朝萬國之處不亦樂乎列陳以待晉軍既濟戰于肥北堅被重瘡三軍潰亂堅馳還長安御覽三百九王猛北海人居魏土少貧賤鬻畚為業嘗至洛陽貨畚有人于市貴買其畚而無直云家近在此可隨我取直猛隨去行不覺遠而忽至深山中此人語猛且住樹下當先啟府君須臾猛進見一公踞胡床頭髮悉白侍从十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何緣拜即十倍售畚直又發人送猛出山既出顧視乃嵩高山也類聚四十七御覽二百九又四百八十四又八百八十一太平廣記二百九十四苻堅青州刺史苻朗降烈宗詔曰朗深識逆順望風歸化既嘉此誠亦簡其才可員外散騎侍郎並賜給之御覽二百二十四姚萇試諸子謂曰吾有一寶物萬金不易汝等技藝勝者吾以與之諸子皆素好馬欲于父前試之惟略不動萇以為賢故越諸兄立為嗣子御覽八百二後蜀李雄太子班雄寢疾班晝夜省侍衣不解帶雄自少攻戰大被傷痍至是多膿潰班為吮膿殊無難色班即雄兄之子也御覽四百十二初閔帝在關中與氐羌破鐵券約不役使御覽五百九十八書鈔引此末句作誓不相侵賨者廩君之苗裔巴氐于務相乘土船而浮眾異之立為廩君子孫列巴中秦並天下而薄其稅賦巴人謂賦為賨因名巴賨綱目十四集覽遼東昌遼縣有青城山劉昭補注五晉錄補遺戴施得璽陰懷還南王彪之議未詳傳國璽造創之始然歷代以來及太始之初揖遜禪位以茲相授故是傳國之守器也始得之宜慶賀書鈔案此事係永和八年中興初以邊寇未靜學校陵遲特聽不試孝廉而茂才猶依舊策試諸州茂才皆憚不往楊儉慷慨恥以衒曜取終身不仕罷歸田里書鈔傅元盛書有青縑袠布袠絹袠書鈔御覽七百四引晉中興簿曰盛書皁縹囊書函中皆有香囊二執朽轡以禦逸馬乘勁風以振秋蓬書鈔王弱冠本州舉秀才名顯當時海內注目書鈔任丞字士恭大興初為屯騎校尉職位兼重居蕃屏躬處儉約乘草莽車書鈔案任丞疑譙王承之誤雖唐晉書云承字敬才而中興書作字士敬又唐晉書云承太興初拜屯騎校尉又謂時湘土荒殘承躬自儉約乘葦茭車胡母崇為永康令多受貨賂政治苛暴詔都街頓鞭一百除名為民御覽六百五十一崔悅字道儒文選盧諶贈崔溫一首注案此引何法盛晉錄
