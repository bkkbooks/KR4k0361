body:
  text: 卷二懸象說懸象說愍帝建興六年十一月光晦二日丙子日食十二月愍帝崩于虜庭開元占經九元帝渡江歲鎮辰太白等四星聚于牛女之閒御覽七武王伐紂五星聚房漢祖入秦亦聚東井所謂先天弗違玉海百九十五引晉中興垂象記大興四年三月癸未日中有黑子占經六永昌元年十月辛卯日中有黑子是時中宗寵幸劉隗擅耀威福有傷君道王敦因之託晉陽之兵逼都輦禍及忠賢故日有瑕也同上成帝咸和二年五月甲申朔日食在東井女主之象明年皇太后以憂逼崩占經十引法盛懸象說咸和五年三月壬戍朔日有食之是時顯宗已長幸司徒第猶出入見王導夫人曹氏如子弟之禮以人君而敬人臣之妻有污君德占經九咸和九年十月乙未日有食之是時顯宗已冠當親萬機而妄敬大臣君逆有污也占經九咸康八年正月己未朔日食京都大雨郡國以聞是謂三朝王者惡之六月而顯宗崩占經九穆宗升平二年十月丙午日中有黑子如卵少時而孝宗崩占經六升平四年八月辛丑朔日食幾既有崩為天門人主惡之明年孝宗崩也同上九哀帝興寧元年八月有星孛于亢入天市後有相龍朱靈寶之亂占經九十帝奕太和四年十月乙未日中有黑子明年海西公廢占經六太和三年三月丁已日有食之五年七月己酉日有食之皆海西被廢之應也占經九孝武帝寧康元年十月己酉日中有黑子如李二年三月庚寅日又有黑子如雞卵二枚是年十一月己巳日又有黑子大如雞子是時烈宗已長而康獻皇后以从嫂臨朝實傷君道故日有瑕占經六太元十三年二月庚子日有黑子大如李十四年二月辛卯日中又有黑子二十年十一月辛卯日中又有黑子是時會稽王以母弟專政故日有瑕占經六太元二十年九月有蓬星如粉絮東南行歷女虛危至哭星其年烈宗崩占經八十六御覽八百七十五安帝隆安元年十二月壬辰日暈有背璚是後帝不親萬機會稽世子元顯專行割罰占經八隆安四年十一月星孛于貫索及天市中天津其時元顯輔政刑罰不中故掃貫索發徭無度故掃天市建失節故掃天津天津關通萬川利關梁也天市貨財帛周百姓也貫索平察刑獄無枉濫也而元顯皆反之若曰掃除穢惡令改革也顯不悅遂致覆滅占經九十隆安五年二月甲寅有流星赤色眾多西行歷牽牛虛危天津閣道貫太微紫宮桓玄篡位之應占經七十四元興元年十月有客星色白如粉絮出太微垣西至十二月入太微占曰兵入天子庭十二月桓玄肆逆宿有極位之也占經八十三義熙六年五月丙子日暈有背璚是時盧龍逼京師戰于郊也占經八
