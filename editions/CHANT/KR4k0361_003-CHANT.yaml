body:
  text: 卷三徵祥說成帝咸和四年陰霖五十餘日蘇峻滅後乃霽占經一百單一類聚二御覽十一舊為羽扇柄者刻木以象骨翮用十毛取金數也中興初王敦始改用長柄使其下出可捉而減其羽用八識者以為服妖也柄使可執者是敦執國柄之象也毛滅用八是羽翮損少而飛翥不終之兆也占經百十四事類賦注十四御覽七百二引中興徵祥說海西公初即位忘設豹尾亦服妖也夫豹尾儀服之主大人之所以豹變也而海西公豹變之日非宜可忘之時天若曰海西公凡庸不可以主社稷故亡其豹尾示不能終也御覽四百九十又六百八十書鈔太元中人不復著摻頭亦服妖也頭親戚起占經百十四舊為屐者齒皆達名曰露卵太元中忽不復徹名陰卵亦服妖也識者以為卵謀也必有陰謀烈宗末驃騎參軍袁悅之始有陰謀之事及隆安遂致大亂御覽六百九十八太元中公主婦女束髮緩鬢髻以為盛飾用髮豐多不可恆戴乃先于籠上掖之名曰假髻以上亦見書鈔或曰假頭至于貧民不能自辦自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓玄之役死者萬計凡被戮之家多無頭首至大斂時皆以繩縛菰草為頭是假髻之應也御覽七百十五又七百六十四書鈔烈宗世會稽王道子輔政于府內園中穿池築山山池之間處處有肆婢酤賣肉于其中道子將見幸乘船至酒肆輒攜入肆買肉酒狀如市廛以為笑樂御覽八百二十八大興二年吳郡米無故壞盡貨糴之屋亦無故壞天戒若曰五榖湧貴無所糴賣不復須屋時陽亡人大飢餓死者十二三萬占經百十四王敦在武昌架屋五間已構五木一宿梁墜地桁在柱上甚危無幾作亂敦滅同上元興二年大𦨵門上屋自壞𦨵門者蓋古之雉門都城之門也王者所由出入是時孝安栱默警蹕之響未嘗至木雉門而桓玄之篡成也同上烈宗起清暑殿識者非之曰清暑反語楚聲也今起殿以酸楚之聲為號非吉祥也頃烈宗崩後桓玄篡自號楚占經百十四御覽百七十五桓玄鎮姑熟屋壁先畫作黃盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤龍御覽百八十五引晉徵祥說咸和十六年夏旱十七年秋冬旱是時烈宗仁恕信任會稽王道子亦舒緩之應御覽八百七十九案此節有誤隆安二年冬旱且寒甚四年夏五月秋旱時孫恩作亂桓玄疑貳內外騷動兵革方興御覽八百七十九哀帝隆和中謠曰升平不滿斗隆和那得久桓公入石頭陛下徒跣走哀皇聞而惡之改為興寧又謠曰雖復改興寧只自無聊生尋哀皇中藥不識萬機占經百十三帝奕太和中童謠曰青青御路楊白馬紫游繮汝非皇太子那得甘露漿又曰鳳凰生一雛人見無不喜謂言是馬駒何悟成龍子是時海西公寵念殿中常侍向龍等因共為亂生子男三人海西以為己子將欲立之既而被廢以馬繮殺三子三子死南方獻甘露公卿三子不得甘露占經百十三義熙初童謠云官家養蘆化成荻蘆生不止自成績是時盧循竊據廣州國未能討因而用之是官養之蘆也荻猶敵也類聚八十二御覽十卷大興二年吳郡府舍地中得犬子二頭一雄一雌太守張懋聞齋內床下犬子聲地自拆見有二犬取而養之皆成尋懋為沈充所害占經百十九晉孝武帝太元中廬江灊縣何旭家忽聞地中有犬子聲即于聲處掘之見一狗突出甚柴瘦走入菰中不知所往視其處有犬子二頭一雌一雄取而養之雌死雄活及長為犬善噬野獸其後旭里中為蠻所沒同上安帝隆安中輔國將軍孫無終家忽一日地中聞犬子聲尋地拆有犬子皆白色一雄一雌取而養之皆死後無終為桓玄所誅同上安帝元興元年八月庚子尚書下舍火是時桓玄用事出鎮姑蘇身雖出外實遙錄尚書事也故天火示不復用也御覽二百十書鈔孝武帝太元二十年冬無雪亦猶春秋之無冰恆燠之罰也是時信任會稽王道子縱酒宴樂不卹政事舒緩之應也御覽八百七十九安帝義熙中宮城上及御道左右皆生蒺藜亦草妖也御覽九百九十七咸和初鷗集太極殿殿非鷗所處鷗湖澤鳥也時蘇峻作逆宮室疲焚御覽九百二十五孝武帝太元十年鸜巢太極殿東鴟尾御覽百八十八成帝咸和元年司徒府羊產無後足其後蘇峻作逆占經百十八簡文帝咸安元年濤水入石頭俄而海西公廢孝武帝大元十三年十二月戊子濤水入石頭毀大船沉殺人己亥江水湧起建康秣陵江渰沒殺人陰旺之應也占經一百元帝太興四年冬大寒民凍死是時王敦肆亂天子不能禁任意專殺戮及大臣占經一百單一御覽八百七十九太興三年二月雨水冰其後有王敦之亂占經一百單一元帝太興二年海鹽縣雨雹大如鴨子御覽十四編珠一太和三年四月雨雹是時王道子輔政姦佞競進烈宗不能禁絕王室大亂占經一百單一元帝太興元年十一月京都雷震凡未應雷而雷皆恆燠也御覽八百七十六穆帝升平二年十一月雷是皇太后臨朝政舒緩也占經一百單二御覽八百七十六安帝元興三年秋永安王皇后自巴陵將設威儀入宮天大雷震人馬多死占經一百單二御覽八百七十六大興二年天鳴東南有聲如水相薄三年又鳴後哀帝廢御覽一元帝大興二年徐州及揚州之西江郡蝗三年冀州蝗皆為肆暴之徵孝武帝太元十六年棠邑界有蝗廣千里長三十里許从南來其飛蔽天害苗稼是時官以賄成皆入私庫貪私苟得之徵也占經百二十成帝咸和四年廬山西大巖崩俄而郭默害江州刺史劉胤伏誅類聚六元帝永昌元年大風拔樹百根編珠一孝武帝寧康三年苻堅長安大風堅宮中樹悉拔是歲王猛死御覽八百七十六桓玄入建康宮逆風迅激旗幟飄亡儀飾一皆傾偃是月酷寒此日尤甚急恆寒若之應也又出遊門外飄風飛其儀蓋御覽八百七十六恭帝之為琅邪王好奇戲門一疋馬于門內令人射之欲觀幾箭而死左右曰馬國姓也而射之不祥甚矣乃止俄而桓玄篡位御覽八百九十五引中興書明帝大寧中武昌有大蛇居神寺神樹上出頭從人受食案京房易妖占曰大蛇見神祠不出三年有大兵國有大憂時王敦作逆占經百二十明帝大寧元年十一月黃霧四塞王敦之應開元占經一百一此節亦見御覽八百七十八成帝咸和元年大霧步武不相見會稽王道子專政之應也同上王者敬養耆老則甘露降于松柏尊賢容眾不失細微則行葦受之甘露者仁澤也其凝如脂其甘如飴王者德至于天則降初學記二又二十八事類賦注三御覽十一又八百七王者德至天氣感而甘露降郡縣魏甘露元年降譙降盱眙方七十五畝類聚九十八武帝時甘露降公卿奏賀詔曰三代盛隆猶自戒勿休況自頃懸象告變盜賊充斥百僚司牧不能存職匪懈使道有寄雖麟鳳不至慶有餘矣若此道未宏雖四靈在郊吾猶懼然何甘露之足賀其停之御覽五百四十三王者不隱其過則玉璧見不斲自成光若日月愍帝建武元年江寧民虞迪墾地得白玉麒麟璽一枚文曰長壽萬年安帝義熙十二年左衛兵陳湯于府前淮水中得玉璽一枚璽亦璧也占經一百十四類聚八十三御覽六百八十二又八百六金勝一名金稱援神契曰神靈滋液百珍寶用有金勝金勝者仁寶也不琢自成光若水月四夷賓服則出穆帝永和九年陽穀民得金勝一枚長五寸狀如織勝後桓溫平蜀路此四方來服之應也占經一百十四御覽七百十九書鈔主德盛則神鼎見神鼎者仁器也能輕能重能息能行不炊而沸不汲而盈絪縕之氣自然而生也亂則藏于深山文明應運而至故禹鑄寶鼎以擬之成帝咸康八年陽穀民劉珪夜見光取得玉鼎一枚四寸此文明之應也占經一百十四類聚七十三事類賦注鼎御覽七百五十六成帝咸和元年宣城春穀山崩得古鼎重三百斤容可三斛餘群臣畢賀御覽七百五十六義熙十一年霍山崩毀出銅鐘六枚上有古文科斗書人莫能識初學記十六御覽五百七十五王者盛德則嘉禾生嘉禾者仁卉也其大盈箱一稃二米國政質則同本而異穎國政文則同穎而異本御覽八百七十三嘉禾者仁草也夏時異本同穎殷時同本異秀周時三穎同秀玉海百九十七王者德盛則嘉禾生仁卉出安帝義熙十三年鞏縣民宋曜于田中穫嘉禾九穗同本九穗九州也是時羌平六合寧御覽八百三十九王者德澤純洽八方同一則木連理連理者仁木也或異枝還合或兩樹共合建元元年木連理四一生膏山一生武昌一生汝陰一生汝陽太興元年又生武昌類聚九十八鳳晨鳴曰發明晝鳴保長舉鳴曰上翔集鳴曰歸昌昏鳴曰固常雄鳴曰即即雌鳴曰足足古微書十一仁智之禽鵠頸而龜腹白帖永和九年吳郡獻白鳶御覽九百二十三引中興書徵祥說白烏仁禽宗廟肅敬則見玉海百九十九麒麟者毛蟲之長也仁獸也牡曰麒牝曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰助積御覽八百八十九初學記二十八麟麕身牛尾狼頭一角黃色馬足也初學記二十八御覽八百八十九麟者應也孟與聖為期也麟角上有肉示不傷也占經一百十六麟一角為天祿兩角為辟邪無角為符拔古微書十天下太平則騶虞見騶虞者仁獸也狀如白虎而黑文其尾參倍昔召公化行陝西之國而騶虞應見類聚九十九王者仁而不害則白虎見白虎者仁獸也狀如虎而白色嘯則風興縞身如雪而無雜毛者是也近代所謂白虎者背斑而虎文爾雅所謂彪虎者也占經百十六類聚九十九中興所在獻白麕類聚九十五成帝咸和六年會秀才于樂賢堂有野麇走至堂前獲之書鈔白鹿者仁獸也王者明惠下及則見色若霜雪白牝牡不與紫鹿為群占經百十六白兔仁獸也王者尊敬耆老則見占經百十六元帝時有二白麂見于南昌郡哀帝興寧元年十月麀入東海王宮麀主也將為天下主之徵後哀帝崩東海王即位占經百十六孝武帝太元十四年六月寧朔州刺史賈統上言晉寧須池縣此月辛卯有馬二疋出于河上一白一烏盤戲相逐河水上從卯至已乃沒占經百十八
