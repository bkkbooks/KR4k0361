body:
  text: 卷一中宗元皇帝中宗元皇帝諱睿字景文世祖咸寧二年生于洛陽初誕有神光之異一室盡明所藉藁如始刈及長白亳生日左角之左眼有精曜嗣為琅邪王唯侍中譙國嵇紹少而異之謂其友曰琅邪王毛骨非常殆非人臣之相惠帝幸臨漳中宗從駕是時中宗叔父東安王繇為成都王頴所害懼禍及謀出奔其夜月明禁衛甚嚴不能得去有頃天暴風雨晦暝徼者四散中宗惁間得脫至河陽為津吏所止從者宗典後至以馬鞭拂之謂曰舍長官禁貴人而汝被駐邪因大笑由是被釋中原喪亂中宗初鎮江東及遷鎮建業以顧榮為軍司馬禮接名豪設官分職隱恤士庶百姓歸心焉初性好酒王導深以為誡乃命左右進觴躬引覆之自是不復飲也愍帝為胡賊劉粲所沒中宗素服出次舉哀三日于是百僚稱上尊號帝固讓百僚又固請中宗慨然流涕曰吾本琅邪王諸賢見逼不已乃呼私奴命駕將反國群臣不敢復逼乃求依魏晉故事為晉王許之劉琨連名勸進中宗云云愍帝崩于平陽百僚更上尊號是日即皇帝位類聚十三立紹為皇太子中宗任刑法以韓子賜太子書鈔元帝以佐命功封周玘為烏程公又封王敦武昌公御覽二百元帝封孔亭為奉聖侯不食戶邑同上二百一太興元年改丹陽內史為丹陽尹類聚五十御覽二百五十二太興元年詔曰亢旱穀貴百性嗷嗷有資者貴糶貧羸之民益困漢世穀貴官賤糶使價不超越謂之平準今雖無此可出閣米萬斛使三分減一以平其價今貧困者悉得足以至秋也御覽三十五太興三年元帝詔曰朕應天符創業江左文選頭陀寺碑文注大旱經久太興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以為舊山川有祈報故雨賽非大事不應告廟臣子無要君之道黷祭稱賽于禮有違御覽五百二十九元帝大典鮮卑送璽書鈔東海王越死妃裴痛越棺柩被焚乃招葬越于丹徒中宗以為非禮乃下詔曰夫冢以藏形廟以安神今世招魂葬者是埋神也其禁之御覽五百五十五又八百八十六王廙為母立屋過制中宗流涕涷之帝所幸鄭夫人袍無文繡其恭儉率下如此御覽四百三十一昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣于是始皇改為秣陵塹北山絶其勢今建康即秣陵西北界所塹即建康南淮中也案始皇東遊之歲至孫權僭號四百三十七年考之年數即不合校之基字又非倫豈應帝王之符而見兆于上代乎有晉金行奄君四海金陵之祥其在斯矣且秦政東遊至今五百二十六年所謂五百年後當有王者也類聚九十八肅宗明皇帝肅宗明皇帝諱紹字道畿中宗長子也建武元年中宗為晉王拜王太子及踐阼尊號為皇太子冊曰於戲朕承天緒忝繼祖宗之洪基君臨于萬邦戰戰兢兢若涉淵冰未有攸濟自古聖王敷宅四海莫不建立元子本枝百世今稽古授爾于儲宮以陪二于朕躬欽哉爾其克念乃祖日新厥德何遠非佞何親非賢欽翼師傅以丕崇大化可不慎歟爾其敬之御覽百四十六肅祖之在東宮敬禮賢士昵近明德與溫嶠庾亮並布衣之好御覽四百七明帝以平錢鳳功封王導始興公溫嶠建寧公庾亮永昌公郗鑒南平公卞壼建興公蘇峻邵陵侯劉泉泉陵侯應詹觀寧侯卞郭益陽侯趙允湘南侯御覽二百大寧三年閏七月帝崩太子衍即位尊明帝后庾氏為皇太后九月癸卯皇太后臨朝稱制司徒王導録尚書事類聚四十八御覽二百十顯宗成皇帝顯宗成皇帝諱衍字世根肅祖長子也即位後蘇峻及祖約阻兵作逆詔庾亮卞壼距之戰于青溪壼等敗績壼死之亮奔江州共陶侃溫嶠率衆下討俊臨陳斬之類聚十三成帝以平蘇峻功封公者三人侯者八人又以討郭默功者三人御覽二百成帝咸康元年詔曰有司條典虔奉郊祀燔柴既饗芳氣清穆其赦天下令咸得自新初學記二十康皇帝康帝諱嶽字世同成帝同母弟也成帝崩上即位年二十二以上亦見世說注四憂哀不忍言政一委中書監庾冰類聚十三孝宗穆皇帝諱聃字彭子康帝子也建元二年康帝疾篤左光祿大夫領司徒謨尚書令恢等上疏曰臣聞皇羲玄邈五帝攸往淳風澆散三王傳嗣欲令國有常君民有定奉關諸盛衰不易之道也伏惟皇子天挺奇表隆準豐下岐嶷之姿彰于始年大成之風顯于期月宜建立儲宮允副民望請下太史擇吉日告宗廟備禮奉行奏可孝宗穆皇帝御覽百四十八康帝崩乃即位時年十九類聚十三穆帝以平蜀功封桓溫臨賀公御覽二百穆帝詔曰實賴英宰淵謀文選褚淵碑文注穆帝升平二年皇帝詔曰佽飛督王饒忽上吾鴆鳥一口云以辟惡此凶物豈宜妄進于是頓鞭饒二百使殿中侍御史孫雲監臨于四衢道焚燒之初學記二十四御覽六百四十九又九百二十七哀皇帝哀帝興寧元年詔庭燎樹端門內類聚八十御覽八百七十一哀帝以平關洛功封桓沖豐城公御覽二百海西公海西公以平袁真功賜桓溫子偉為西昌公御覽二百太宗簡文皇帝太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永昌二年封琅邪王咸和元年鄭夫人薨上時年七歲哀號守誠乞得服重朝議哀之故徙封會稽王建元元年詔曰太常職天地兼掌宗廟其為任也可謂重矣是以古今選建未常不妙簡時望兼之儒雅遠通天人洽暢神祗會稽王叔履尚清虛志道無倦優游諷議朕所咨仰其以王領太常本官如故康獻皇后臨朝建位撫軍大將軍録尚書六條事二年驃騎將軍何充薨皇太后詔上內總萬機海西公即位七月以琅邪王封絶徙上為琅邪王封王子昌明會稽王固讓不受太和元年十月詔會稽王體道沖虛理識明允阿衡孝文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徵五教儀形具瞻登賢顯親國之典也其以為丞相録尚書事入朝不趨讚拜不名劍履上殿給羽葆鼓吹班劍六十人固讓不受海西公廢皇太后詔曰會稽王英秀玄虛神棲事外于是大司馬溫及百官進太極前殿具乘輿法駕奉迎于朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年為咸安元年乙卯廢太宰武陵王為庶人二年三月乙卯簡文詔曰祿不代耕非經通之制也文選上蕭太傅固辭奪禮啓注七月上不豫己末立皇太子昌明為皇太子封皇子道子為琅邪王領會稽國是日帝崩于東堂在位二年時年五十二御覽九十九烈宗孝武皇帝烈宗孝武皇帝諱昌明太宗第三子也類聚十三寧康元年七月桓溫卒烈宗沖幼桓溫威震外內人情噂𠴲互生同異謝安與王垣之盡忠匡翼溫諷朝廷欲為九錫使驍騎將軍袁宏具草時溫已疾篤宏以呈安安視輒云不好更勾改之使彌旬日至于溫薨錫命遂寢類聚五十三御覽二百三以桓沖代溫都督諸軍事烈宗詔曰桓沖協隆治道文選齊故昭王碑文注孝武詔曰躬儉以宏下濟之惠文選車駕幸京口侍游蒜山作注孝武詔曰誠存匪懈治道有寄也同上宣德皇后令注太元二年興滅繼絶復陳蹇後浩之為高平公裴秀後球為巨鹿公王沉後卜之為博陵公荀勗後軌為濟北侯何曾後闡為朗陵侯羊祜後法興為巨平侯類聚五十一太元三年詔曰鹽者國之重利書鈔安皇帝烈宗長子也冊為皇太子曰岐嶷表于載誕克廣同乎大城是用命爾以登儲二安皇帝初學記十安帝以興復功封劉裕二十三人裕唱謀豫章公萬戶劉毅南平公五千戶何無忌安成公劉道規華容公御覽二百安帝義熙元年禁絹扇及樗蒲事類賦注扇御覽七百二恭帝劉裕都督中外諸軍詔曰大司馬地隆任重親賢莫二元熙二年禪宋昔中宗以丁丑之歲是稱晉王改築宗廟使郭璞筮之云載祀二百及今禪代庾申之歲凡百有二年而天祿永終璞精于術數理無乖二抑以百二期促故倒其詞為二百乎御覽一百
