body:
  text: 卷六威蕃録彭城王紘以肅祖明皇帝好佛手畫形像經歷寇難而此堂猶正宜成作頌蔡謨云今發王命稱先帝好佛不義有礙文選頭陀寺碑文注譙閔王承字士敬為湘州刺史中宗謂承曰湘州南楚險固在上流之要控三州之會是用武之國今以叔父為之書鈔譙王承鎮湘州至武昌釋軍備見王敦敦因宴集謂承曰大王雅素佳士非將御才也承曰公未盡耳安知鉛刀不能一割承以敦欲測其情故發此言敦果謂錢鳳曰彼不知懼而學壯語此之不武何能為聽承之鎮御覽百五十一譙王承為湘州刺史王敦遣參軍桓羆說承以劉隗專寵令討之請承為軍司承歎曰吾其死矣地荒民鮮勢援絶赴君難忠也死王事義也死忠與義亦復何求便唱義衆府長史長沙人虞悝慷慨有志節共盟誓囚桓羆馳檄湘州于是一州之內並皆同赴同上四百十七司馬無忌讓屯騎校尉之任職典禁兵宿衛事重必宜其人豈臣微弱所克堪也書鈔六十一褚逶為江州無忌于坐拔刀斫耆之裒與桓景共免之御史奏無忌欲專殺害詔以贖論世說注二十譙王恬字元愈為御史中丞值海西公廢太宗即位未解嚴大司馬桓溫屯軍中堂夜吹警角御史中丞司馬恬奏劾大不敬請治罪明日溫見奏事嘆曰此兒乃敢彈我真可畏也初學記十二書鈔御覽二百二十六梁王珍之初桓玄篡位國人有孔璞者奉珍之奔尋陽義旗既興歸朝廷仕至太常卿以罪誅世說注八南頓王宗之字延祖拜左衛將軍為肅祖所抳委以禁旅御覽二百三十七元皇以明帝及琅邪王裒並非敬后所生而謂裒有大成之度勝于明帝因從容問王導曰立子以德不以年今二子孰賢導曰世子宣城俱有爽明之德莫能優劣如此故當以年于是更封裒為琅邪王世說注二東海王沖為長水校尉年十一高選綱佐以劉耽為司馬顧和為主簿書鈔武陵威王晞為桓溫所忌表晞廢王徙新安郡受拜流涕書鈔引晉中興書威蕃録武陵威王晞為桓溫所收忠敬王少子也被廢後新安王尊初封新寧王年十二受拜流涕哀感左右將軍桓伊嘗造遵遵怒門人曰何通桓氏門人曰桓伊與桓溫疏宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聰察及長輒凡退無復名望御覽百五十一會稽文孝王道子以録尚書六條開府領司徒又領揚州録尚書事安帝即位公卿奏進位丞相揚州牧假黃鉞羽葆書鈔類聚六十八武陵王令曰丞相墳塋翳然飄薄非所也文選為宋公修楚元王墓教注
