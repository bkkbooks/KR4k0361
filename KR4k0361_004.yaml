body:
  text: 卷四謝夫人謝夫人名玖家本貧賤父以屠羊為業玖清惠真正有淑姿選入後宮為才人御覽百四十五元夏侯太妃中宗母王太妃夏侯氏字光姬一字銅環太妃為恭王妃生中宗王薨中宗嗣立稱王太妃永嘉元年薨還葬琅邪御覽百五十一元敬虞后元敬皇后虞氏字孟母濟陽外黃人也祖壽撫軍大將軍掾父豫太傅參軍中宗之為琅邪王納后為妃永嘉六年薨後封豫妻王氏為邢陽縣君從母散騎常侍新野王罕妻為平陽鄉君御覽百五十一又二百二明荀太妃肅祖太妃豫章恭惠君荀氏初以微入宮生蕭祖中宗以母賤命虞妃母養肅祖而出嫁荀為馬氏妻太寧元年馬氏無疾而卒肅祖迎母還宮養稱建安君御覽二百二咸康元年肅祖太妃荀氏薨顯宗詔曰朕少遭閔凶茲訓無稟文選齊敬皇后哀策文注追贈豫章君諡曰恭惠御覽二百二明穆庾后明穆皇后庾氏諱文君左將軍琛第三女也后少以圭璋特異令儀淑美八字亦見書鈔故中宗為肅宗納焉初為世子妃仁和有禮深見敬重御覽百三十八太寧元年六月立為皇后策明穆皇后曰正位閨房以著協德之義文選齊敬皇后哀策文注贈琛為車騎將軍母邱氏封安陽縣君從母荀氏永宣縣君御覽二百二后生顯宗成皇帝顯宗即位尊后曰皇太后群臣奏天子幼沖宜依漢和熹皇后故事后辭讓數四不得已遂臨朝攝萬機蘇峻作逆王師敗績后以憂逼崩時年三十三御覽百三十八成恭杜后成恭皇后杜氏陵陽京兆人也成帝贈后母裴氏為廣德縣高安鄉君此句亦見書鈔賜錢百萬布五百匹御覽二百二康獻褚后康獻皇后褚氏字蘇子太傅裒之女也后聰明有器識以名家女入為琅邪王妃生孝宗穆皇帝封母謝氏為尋陽縣君御覽二百穆宗即位尊后曰皇太后奏曰伏惟陛下臨朝攝政以寧天下書鈔于是臨朝稱制同上泰元元年太后詔曰皇帝婚冠禮備假邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典于是復稱崇德太后九年崩于顯揚殿御覽百三十八穆章何后穆章皇后何氏字法倪司空充之女追贈父充光祿大夫封晉興侯母孔氏長樂鄉君御覽二百二哀靖王后哀靖皇后王氏字穆之司徒左長史濛之女也初為琅邪王妃哀帝即位拜為皇后追贈父濛金紫光祿大夫封晉安縣侯母愛氏為安國鄉君也御覽二百二海西孝庾后海西孝皇后庾氏孝道憐司空冰女也初為海西王妃海西即位拜為皇后太和元年崩葬敬平陵帝廢追貶海西公夫人無子御覽百五十一簡文宣鄭太后簡文宣太后鄭氏諱阿春滎陽人少孤先適渤海田氏生一男夫亡后依于舅濮陽吳氏時中宗為丞相敬后虞氏先崩將納吳氏女為夫人后及吳氏女並遊後園有見之者言之于中宗曰鄭氏女雖嫠居賢于吳氏遠矣遂以德色納為夫人甚有寵生簡文帝以上亦略見世説注三后雖貴幸而恆有憂色中宗問其故對曰妾有妹中者適長沙王褒餘二妹未出恐姊既為人妾無復求者中宗從容謂劉隗曰鄭氏有二妹卿可求佳對使不失舊隗舉其從子備娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平園夫人咸和元年薨御覽百三簡文帝即位尊之曰文宣太后世説注三簡文順王后簡文皇后王氏字蘭姬后以冠族太宗納焉初為會稽王妃生子道生為世子並失太宗意后及道生俱被幽廢以憂薨烈宗踐阼追尊曰順皇后御覽百五十一后驃騎將軍述之再從妹追贈前夫人成氏東豐縣君後夫成氏東興君同上二百二孝武文李太后孝武太后李氏以微賤入為會稽王宮人夢兩龍枕膝日月入懷太宗異而召之生烈宗類聚九十八孝武定王后孝武定皇后王氏字法惠寧康三年中軍將軍桓沖侍中臣康奏晉陵太守王蘊女天性柔順惠心塞淵四字亦見書鈔儀度既同四業允備且盛德之兆美善先積參議可以配德乾元恭承宗廟貞進六宮母儀天下故烈宗納焉御覽百三十八王蘊以后父徵拜金紫光祿大夫封建昌侯母劉氏平樂鄉君同上二百二后性嗜酒驕妬帝深患之乃召蘊于東堂具説后過狀令加訓誡蘊免冠謝焉后于是少自改飭太元亟年崩御覽百三十八安德陳太后安德太后陳氏松滋人也諱歸女父廣以倡進仕至平昌太守后以美色能歌彈入宮初為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后御覽百三十八臨海公主惠帝第四女羊皇后所生初封清河公主未出適值永嘉亂以上亦見初學記十傳賣長城民錢溫溫以送女女遇主甚酷主自告吳興太守周札以聞于是殺溫及女適誰國曹統類聚十六御覽百五十二南康宣公主興男明帝長女庾后所生初封遂安縣主適桓溫御覽百五十二新安愍公主道福簡文第三女徐淑媛所生適桓濟重適王獻之御覽百五十二名家應運書鈔修序婦道同上修教于內正立閨房白帖正位居體美在其中同上
