body:
  text: 卷五百官公卿表注百官公卿表注虞譚陳略曹毗毛安之並為左衛將軍御覽二百三十七哀帝興寧二年桓溫奏散騎常侍二人復置四人凡一省文書表奏意異者為散騎常侍比于侍中貂璫插石書鈔博士之職非徒博習舊說訓教學徒而已端委佩玉朝之大典必于詢度當以正道克厭人望然後為可書鈔御覽二百二十九齊王攸為司空行太子太傅事書鈔引中興書百官公卿表注王導以驃騎將軍儀同三司領太子太傅書鈔惠帝在東宮以中舍人與中庶子共治文書注武帝咸寧初置中舍人書鈔引中興書百官公卿志注在漢武帝時南平百越始置交阯九真日南合浦南海鬱林蒼梧凡七郡立交州刺史以統之以州邊遠山粵不賓宜加威重故刺史輒假節七郡皆加鼓吹書鈔御覽五百六十七漢制人君特寵皆賜之封邑書鈔元帝以佐命功封周玘烏程公又封王敦武昌公御覽二百元帝封孔亭為奉聖侯不食戶邑同上二百一明帝以平錢鳳功封王導始興公溫矯建寧公庾亮永昌公郗鑒南平公卞壼建興公蘇峻邵陵侯劉臮泉陵侯應詹觀寧侯卞郭益陽侯趙胤湘南侯御覽二百元帝詔封魏後曹勵為陳留王類聚五十一御覽二百一成帝以平蘇峻功封公者三人侯者八人又以討郭默功者三人御覽二百穆帝以平蜀功封桓溫臨賀公御覽二百哀帝以平關洛功封桓沖豐城公同上海西公以平袁真功賜桓溫子偉為西昌公同上孝武帝太元二年興滅繼絕復故陳騫後浩之為高平公裴秀後球為鉅鹿公王沉後朴之為博陵公荀勗後軌為濟北侯何曾後闡為朗陵侯羊祜後法興為鉅平侯類聚五十一安帝以興復功封劉裕等二十三人裕以唱謀封豫章公萬戶劉毅南平公五千戶何無忌安成公劉道規華容公御覽二百
